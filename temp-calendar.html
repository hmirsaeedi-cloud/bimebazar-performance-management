<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BimeBazar Calendar Settings</title>
    <style>
      :root {
        --bg: #f5f8f7;
        --panel: #ffffff;
        --ink: #172026;
        --muted: #5c6b73;
        --line: #d8e1e5;
        --teal: #0c7c7c;
        --danger: #b13d3a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main { max-width: 980px; margin: 0 auto; padding: 28px 18px 48px; }
      header { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
      h1 { margin: 0 0 6px; font-size: clamp(1.8rem, 4vw, 3rem); }
      h2 { margin: 0 0 12px; }
      p { margin: 0; color: var(--muted); }
      section {
        margin-top: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        background: var(--panel);
        box-shadow: 0 12px 36px rgba(22, 40, 48, 0.08);
      }
      .grid { display: grid; grid-template-columns: repeat(3, minmax(150px, 1fr)); gap: 12px; }
      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 750;
      }
      input, select {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        color: var(--ink);
        font: inherit;
      }
      button {
        min-height: 40px;
        border: 0;
        border-radius: 8px;
        background: var(--teal);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }
      .message { display: none; margin-top: 12px; border-radius: 8px; padding: 10px 12px; }
      .message.error { display: block; border: 1px solid #efb3ad; background: #fff0ee; color: var(--danger); }
      .message.success { display: block; border: 1px solid #b8dfc2; background: #eefaf1; color: #245f37; }
      dl { display: grid; grid-template-columns: 190px 1fr; gap: 10px; margin: 0; }
      dt { color: var(--muted); font-weight: 800; }
      dd { margin: 0; }
      @media (max-width: 760px) {
        header { align-items: stretch; flex-direction: column; }
        .grid, dl { grid-template-columns: 1fr; }
      }
    </style>
    <link rel="stylesheet" href="detail-ui.css?v=flip7-system-2" />
    <link rel="stylesheet" href="product-ui.css?v=flip7-system-2" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Calendar Settings</h1>
          <p>Temporary Core settings page for Jalali/Gregorian display preferences.</p>
        </div>
        <nav>
          <a href="/temp-profiles.html">Profiles</a>
          <a href="/temp-rtl.html" style="margin-left: 12px">Language</a>
          <a href="/index.html" style="margin-left: 12px">Workspace</a>
        </nav>
      </header>

      <section>
        <h2>Current Preferences</h2>
        <dl id="currentPrefs">
          <dt>Status</dt><dd>Loading...</dd>
        </dl>
      </section>

      <section>
        <h2>Update My Calendar</h2>
        <form id="calendarForm" class="grid">
          <label>Calendar
            <select id="preferredCalendar">
              <option value="jalali">Jalali</option>
              <option value="gregorian">Gregorian</option>
            </select>
          </label>
          <label>Locale
            <select id="preferredLocale">
              <option value="fa-IR">Persian</option>
              <option value="en-US">English</option>
            </select>
          </label>
          <label>Timezone
            <select id="dateDisplayTimezone">
              <option value="Asia/Tehran">Asia/Tehran</option>
              <option value="UTC">UTC</option>
            </select>
          </label>
          <label>Reason<input id="reason" value="User updated calendar preferences" /></label>
          <button type="submit">Save preferences</button>
        </form>
        <div id="message" class="message"></div>
      </section>
    </main>

    <script>
      const supabaseUrl = "https://omjblauittoyxknabrqg.supabase.co";
      const publishableKey = "sb_publishable_aEtaP2vsKfYpN50nuo2CSg_tU1nLEfc";
      let accessToken = localStorage.getItem("bb_access_token") || "";
      let currentUser = null;

      const message = document.querySelector("#message");
      const currentPrefs = document.querySelector("#currentPrefs");

      function showMessage(text, type) {
        message.textContent = text;
        message.className = `message ${type}`;
      }

      async function supabaseFetch(path, options = {}) {
        const response = await fetch(`${supabaseUrl}${path}`, {
          ...options,
          headers: {
            apikey: publishableKey,
            Authorization: `Bearer ${accessToken}`,
            "Content-Type": "application/json",
            ...(options.headers || {}),
          },
        });
        const text = await response.text();
        const data = text ? JSON.parse(text) : null;
        if (!response.ok) throw new Error(data?.message || data?.msg || data?.hint || "Request failed");
        return data;
      }

      async function ensureToken() {
        if (!accessToken) {
          throw new Error("Please open Login first, then return to this page.");
        }
        currentUser = await supabaseFetch("/auth/v1/user");
      }

      async function writeAudit(profile, previous, reason) {
        const nextStatus = previous.calendar_preference_status === "hr_override_pending" ? "hr_overridden" : "user_configured";
        await supabaseFetch("/rest/v1/audit_events", {
          method: "POST",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify({
            actor_user_id: currentUser.id,
            target_user_id: profile.id,
            action: "core.calendar_preferences.updated",
            entity_type: "calendar_preferences",
            entity_id: profile.id,
            from_status: previous.calendar_preference_status || "defaulted",
            to_status: nextStatus,
            reason,
            metadata: {
              owner: "EMPLOYEE",
              nextAction: "user_update",
              previous,
              next: profile,
            },
          }),
        });
      }

      async function loadPrefs() {
        const [profile] = await supabaseFetch(`/rest/v1/profiles?id=eq.${currentUser.id}&select=id,email,display_name,preferred_calendar,preferred_locale,date_display_timezone,calendar_preference_status`);
        if (!profile) throw new Error("Profile not found");
        document.querySelector("#preferredCalendar").value = profile.preferred_calendar || "jalali";
        document.querySelector("#preferredLocale").value = profile.preferred_locale || "fa-IR";
        document.querySelector("#dateDisplayTimezone").value = profile.date_display_timezone || "Asia/Tehran";
        currentPrefs.innerHTML = `
          <dt>Name</dt><dd>${profile.display_name}</dd>
          <dt>Email</dt><dd>${profile.email}</dd>
          <dt>Calendar</dt><dd>${profile.preferred_calendar}</dd>
          <dt>Locale</dt><dd>${profile.preferred_locale}</dd>
          <dt>Timezone</dt><dd>${profile.date_display_timezone}</dd>
          <dt>Status</dt><dd>${profile.calendar_preference_status || "defaulted"}</dd>
        `;
        return profile;
      }

      document.querySelector("#calendarForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const previous = await loadPrefs();
          const nextStatus = previous.calendar_preference_status === "hr_override_pending" ? "hr_overridden" : "user_configured";
          await supabaseFetch(`/rest/v1/profiles?id=eq.${currentUser.id}`, {
            method: "PATCH",
            headers: { Prefer: "return=representation" },
            body: JSON.stringify({
              preferred_calendar: document.querySelector("#preferredCalendar").value,
              preferred_locale: document.querySelector("#preferredLocale").value,
              date_display_timezone: document.querySelector("#dateDisplayTimezone").value,
              calendar_preference_status: nextStatus,
            }),
          });
          const next = await loadPrefs();
          await writeAudit(next, previous, document.querySelector("#reason").value);
          showMessage("Calendar preferences saved.", "success");
        } catch (error) {
          showMessage(error.message, "error");
        }
      });

      (async function init() {
        try {
          await ensureToken();
          await loadPrefs();
        } catch (error) {
          showMessage(error.message, "error");
        }
      })();
    </script>
    <script src="detail-shell.js?v=flip7-system-2"></script>
  </body>
</html>
