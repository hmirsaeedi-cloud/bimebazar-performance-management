<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BimeBazar Conditional Form Logic</title>
    <style>
      :root { --bg:#f5f8f7; --panel:#fff; --ink:#172026; --muted:#5c6b73; --line:#d8e1e5; --teal:#087c7c; --gold:#bd7f18; --danger:#b33b35; --green:#2f7d49; }
      * { box-sizing:border-box; }
      body { margin:0; background:var(--bg); color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      main { max-width:1240px; margin:0 auto; padding:28px 18px 48px; }
      header,.toolbar { display:flex; justify-content:space-between; align-items:center; gap:16px; }
      h1 { margin:0 0 6px; font-size:clamp(1.8rem,4vw,3rem); }
      h2 { margin:0 0 12px; }
      p { margin:0; color:var(--muted); line-height:1.45; }
      section { margin-top:18px; border:1px solid var(--line); border-radius:8px; padding:18px; background:var(--panel); box-shadow:0 12px 34px rgba(22,40,48,.08); }
      form { display:grid; grid-template-columns:repeat(3,minmax(180px,1fr)); gap:12px; }
      label { display:grid; gap:6px; color:var(--muted); font-size:.82rem; font-weight:750; }
      input,select,textarea { border:1px solid var(--line); border-radius:8px; padding:10px; color:var(--ink); font:inherit; background:#fff; }
      textarea { min-height:132px; resize:vertical; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:.82rem; }
      button { min-height:40px; border:0; border-radius:8px; background:var(--teal); color:#fff; cursor:pointer; font:inherit; font-weight:800; padding:0 12px; }
      button.secondary { border:1px solid var(--line); background:#fff; color:var(--ink); }
      button.warning { background:var(--gold); }
      table { width:100%; border-collapse:collapse; margin-top:14px; }
      th,td { border-bottom:1px solid var(--line); padding:10px 8px; text-align:left; vertical-align:top; }
      th { color:var(--muted); font-size:.78rem; }
      code { font-size:.76rem; word-break:break-word; }
      .full { grid-column:1 / -1; }
      .pill { display:inline-flex; border-radius:999px; padding:4px 8px; background:#e8f4f2; color:#075b5b; font-size:.76rem; font-weight:800; }
      .pill.returned,.pill.visibility_changed { background:#fff1d6; color:#7a4f00; }
      .pill.active { background:#e9f7ed; color:var(--green); }
      .pill.archived { background:#eef0f1; color:#51616a; }
      .muted { margin-top:4px; color:var(--muted); font-size:.75rem; }
      .actions { display:flex; flex-wrap:wrap; gap:8px; }
      .message { display:none; margin-top:12px; border-radius:8px; padding:10px 12px; }
      .message.error { display:block; border:1px solid #efb3ad; background:#fff0ee; color:var(--danger); }
      .message.success { display:block; border:1px solid #b8dfc2; background:#eefaf1; color:#245f37; }
      .preview { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
      .metric { border:1px solid var(--line); border-radius:8px; padding:12px; background:#fbfdfc; }
      @media (max-width:980px) { header,.toolbar { align-items:stretch; flex-direction:column; } form,.preview { grid-template-columns:1fr; } table { display:block; overflow-x:auto; } }
    </style>
    <link rel="stylesheet" href="detail-ui.css?v=sidebar-brand-standard-1" />
    <link rel="stylesheet" href="product-ui.css?v=sidebar-brand-black-1" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Conditional Form Logic</h1>
          <p>Create reviewed rule sets that show, hide, require, or make questions optional based on earlier answers.</p>
        </div>
        <nav><a href="/index.html">Workspace</a></nav>
      </header>

      <section>
        <h2>Create Rule Set</h2>
        <form id="logicForm">
          <label>Template<select id="templateId" required></select></label>
          <label>Version<select id="versionId" required></select></label>
          <label>Name<input id="name" value="Low score follow-up logic" required /></label>
          <label class="full">Description<input id="description" value="Require extra manager context when a score is low." /></label>
          <label class="full">Rules JSON<textarea id="rulesJson" required></textarea></label>
          <button type="submit">Create rule set</button>
          <button class="secondary" id="reloadButton" type="button">Reload</button>
        </form>
        <div id="message" class="message"></div>
      </section>

      <section>
        <h2>Preview Answers</h2>
        <form id="previewForm">
          <label>Overall rating<input id="overallRating" type="number" min="0" max="5" value="2" /></label>
          <label>Text answer<input id="textAnswer" value="needs support" /></label>
          <label class="full">Selected rule set<select id="previewRuleSet"></select></label>
          <button type="submit">Preview logic</button>
        </form>
        <div class="preview" id="previewResult"></div>
      </section>

      <section>
        <div class="toolbar"><div><h2>Rule Sets</h2><p id="countLabel">Loading...</p></div></div>
        <table>
          <thead><tr><th>Name</th><th>State</th><th>Rules</th><th>Visibility</th><th>Actions</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
    </main>

    <script src="demo-data.js?v=demo-users-1"></script>
    <script>
      const supabaseUrl = "https://omjblauittoyxknabrqg.supabase.co";
      const publishableKey = "sb_publishable_aEtaP2vsKfYpN50nuo2CSg_tU1nLEfc";
      let accessToken = localStorage.getItem("bb_access_token") || "";
      let currentUser = null;
      let templates = [];
      let ruleSets = [];
      const message = document.querySelector("#message");
      const rows = document.querySelector("#rows");
      const countLabel = document.querySelector("#countLabel");
      const rulesJson = document.querySelector("#rulesJson");
      const stateByStatus = {
        draft:{ status:"draft", owner:"HR_ADMIN", nextAction:"submit" },
        submitted:{ status:"submitted", owner:"HRBP", nextAction:"approve" },
        approved:{ status:"approved", owner:"HR_ADMIN", nextAction:"activate" },
        active:{ status:"active", owner:"SYSTEM", nextAction:null },
        returned:{ status:"returned", owner:"HR_ADMIN", nextAction:"update" },
        visibility_changed:{ status:"visibility_changed", owner:"HR_ADMIN", nextAction:"update" },
        archived:{ status:"archived", owner:"SYSTEM", nextAction:null },
      };
      const actionStatus = { update:"draft", submit:"submitted", approve:"approved", activate:"active", return:"returned", visibility:"visibility_changed", archive:"archived" };
      function showMessage(text, type) { message.textContent = text; message.className = `message ${type}`; }
      async function supabaseFetch(path, options = {}) {
        const response = await fetch(`${supabaseUrl}${path}`, { ...options, headers:{ apikey:publishableKey, Authorization:`Bearer ${accessToken}`, "Content-Type":"application/json", ...(options.headers || {}) } });
        const text = await response.text(); const data = text ? JSON.parse(text) : null;
        if (!response.ok) throw new Error(data?.message || data?.msg || data?.hint || "Request failed");
        return data;
      }
      async function ensureToken() {
        if (!accessToken) {
          throw new Error("Please open Login first, then return to this page.");
        }
        currentUser = await supabaseFetch("/auth/v1/user");
      }
      function defaultRules() {
        return [{ id:"show_manager_comment_for_low_score", label:"Require comment for low score", sourceQuestionId:"overall_rating", operator:"lte", value:2, targets:[{ questionId:"manager_comment", effect:"show" }, { questionId:"manager_comment", effect:"require" }] }];
      }
      function evaluate(rules, answers) {
        const visible = new Set(), hidden = new Set(), required = new Set(), matched = [];
        for (const rule of rules) {
          const value = answers[rule.sourceQuestionId];
          let ok = false;
          if (rule.operator === "lte") ok = Number(value) <= Number(rule.value);
          if (rule.operator === "gte") ok = Number(value) >= Number(rule.value);
          if (rule.operator === "equals") ok = value === rule.value;
          if (rule.operator === "not_equals") ok = value !== rule.value;
          if (rule.operator === "contains") ok = String(value || "").includes(String(rule.value || ""));
          if (rule.operator === "is_empty") ok = value === undefined || value === null || value === "";
          if (rule.operator === "is_not_empty") ok = !(value === undefined || value === null || value === "");
          if (!ok) continue;
          matched.push(rule.id);
          for (const target of rule.targets || []) {
            if (target.effect === "show") { visible.add(target.questionId); hidden.delete(target.questionId); }
            if (target.effect === "hide") { hidden.add(target.questionId); visible.delete(target.questionId); required.delete(target.questionId); }
            if (target.effect === "require") required.add(target.questionId);
            if (target.effect === "optional") required.delete(target.questionId);
          }
        }
        return { visibleQuestionIds:[...visible], hiddenQuestionIds:[...hidden], requiredQuestionIds:[...required], matchedRuleIds:matched };
      }
      async function writeAudit(action, item, fromStatus, toStatus, metadata = {}) {
        await supabaseFetch("/rest/v1/audit_events", { method:"POST", headers:{ Prefer:"return=minimal" }, body:JSON.stringify({ actor_user_id:currentUser.id, action, entity_type:"form_conditional_logic", entity_id:item.id, from_status:fromStatus, to_status:toStatus, reason:metadata.reason || null, metadata:{ formTemplateId:item.form_template_id, formTemplateVersionId:item.form_template_version_id, owner:metadata.owner, nextAction:metadata.nextAction, ruleCount:(item.rules || []).length, ...metadata } }) });
      }
      async function loadTemplates() {
        templates = await supabaseFetch("/rest/v1/form_templates?select=*,form_template_versions(*)&order=updated_at.desc");
        document.querySelector("#templateId").innerHTML = templates.map((template) => `<option value="${template.id}">${template.name} · ${template.status}</option>`).join("");
        syncVersions();
      }
      function currentTemplate() { return templates.find((template) => template.id === document.querySelector("#templateId").value); }
      function syncVersions() {
        const template = currentTemplate();
        const versions = [...(template?.form_template_versions || [])].sort((a,b) => Number(b.version_number || 0) - Number(a.version_number || 0));
        document.querySelector("#versionId").innerHTML = versions.map((version) => `<option value="${version.id}">v${version.version_number} · ${version.version_status || version.status}</option>`).join("");
      }
      async function loadRuleSets() {
        ruleSets = await supabaseFetch("/rest/v1/form_conditional_logic_rules?select=*&order=updated_at.desc");
        countLabel.textContent = `${ruleSets.length} rule set${ruleSets.length === 1 ? "" : "s"}`;
        document.querySelector("#previewRuleSet").innerHTML = ruleSets.map((item) => `<option value="${item.id}">${item.name} · ${item.status}</option>`).join("");
        rows.innerHTML = ruleSets.map((item) => `<tr>
          <td><strong>${item.name}</strong><div class="muted"><code>${item.id}</code></div><div class="muted">${item.description || ""}</div></td>
          <td><span class="pill ${item.status}">${item.status}</span><div class="muted">${item.owner_role} / ${item.next_action || "done"}</div></td>
          <td><code>${JSON.stringify(item.rules)}</code></td>
          <td><code>${JSON.stringify(item.visibility)}</code></td>
          <td class="actions">
            ${["draft","returned","visibility_changed"].includes(item.status) ? `<button data-action="submit" data-id="${item.id}">Submit</button><button class="secondary" data-action="update" data-id="${item.id}">Update</button>` : ""}
            ${item.status === "submitted" ? `<button data-action="approve" data-id="${item.id}">Approve</button><button class="warning" data-action="return" data-id="${item.id}">Return</button>` : ""}
            ${item.status === "approved" ? `<button data-action="activate" data-id="${item.id}">Activate</button>` : ""}
            ${item.status !== "archived" ? `<button class="secondary" data-action="visibility" data-id="${item.id}">Visibility</button><button class="secondary" data-action="archive" data-id="${item.id}">Archive</button>` : ""}
          </td>
        </tr>`).join("");
        document.querySelectorAll("[data-action]").forEach((button) => button.addEventListener("click", () => handleAction(button.dataset.id, button.dataset.action).catch((error) => showMessage(error.message, "error"))));
      }
      async function createRuleSet(event) {
        event.preventDefault();
        const rules = JSON.parse(rulesJson.value);
        const state = stateByStatus.draft;
        const item = {
          id:crypto.randomUUID(),
          form_template_id:document.querySelector("#templateId").value,
          form_template_version_id:document.querySelector("#versionId").value,
          status:state.status,
          owner_role:state.owner,
          next_action:state.nextAction,
          name:document.querySelector("#name").value.trim(),
          description:document.querySelector("#description").value.trim(),
          rules,
          preview_result:evaluate(rules, {}),
          visibility:{ employeeCanView:false, managerCanView:false, hrbpCanView:true, hrAdminCanView:true },
          created_by:currentUser.id,
          updated_by:currentUser.id,
        };
        await supabaseFetch("/rest/v1/form_conditional_logic_rules", { method:"POST", headers:{ Prefer:"return=minimal" }, body:JSON.stringify(item) });
        await writeAudit("form_conditional_logic.created", item, null, state.status, { owner:state.owner, nextAction:state.nextAction });
        showMessage("Conditional rule set created and audit event written.", "success");
        await loadRuleSets();
      }
      async function handleAction(id, action) {
        const item = ruleSets.find((row) => row.id === id);
        const next = stateByStatus[actionStatus[action]];
        const auditActionByAction = {
          update:"updated",
          submit:"submitted",
          approve:"approved",
          activate:"activated",
          return:"returned",
          visibility:"visibility_changed",
          archive:"archived",
        };
        const patch = { status:next.status, owner_role:next.owner, next_action:next.nextAction, updated_by:currentUser.id, updated_at:new Date().toISOString() };
        if (action === "update") { patch.rules = JSON.parse(rulesJson.value); patch.preview_result = evaluate(patch.rules, {}); }
        if (action === "submit") patch.submitted_at = new Date().toISOString();
        if (action === "approve") patch.approved_at = new Date().toISOString();
        if (action === "activate") patch.activated_at = new Date().toISOString();
        if (action === "return") { patch.returned_at = new Date().toISOString(); patch.last_return_reason = prompt("Reason for return", "Needs one more rule check.") || "Returned for revision"; }
        if (action === "visibility") { patch.visibility_changed_at = new Date().toISOString(); patch.visibility = { ...(item.visibility || {}), managerCanView:true }; }
        if (action === "archive") patch.archived_at = new Date().toISOString();
        await supabaseFetch(`/rest/v1/form_conditional_logic_rules?id=eq.${id}`, { method:"PATCH", headers:{ Prefer:"return=minimal" }, body:JSON.stringify(patch) });
        await writeAudit(`form_conditional_logic.${auditActionByAction[action]}`, item, item.status, next.status, { owner:next.owner, nextAction:next.nextAction, reason:patch.last_return_reason });
        showMessage(`Rule set moved to ${next.status}.`, "success");
        await loadRuleSets();
      }
      function preview(event) {
        event.preventDefault();
        const item = ruleSets.find((row) => row.id === document.querySelector("#previewRuleSet").value);
        const result = evaluate(item?.rules || [], { overall_rating:Number(document.querySelector("#overallRating").value), text_answer:document.querySelector("#textAnswer").value });
        document.querySelector("#previewResult").innerHTML = Object.entries(result).map(([key, value]) => `<div class="metric"><strong>${key}</strong><div class="muted">${value.length ? value.join(", ") : "None"}</div></div>`).join("");
      }
      async function init() {
        try {
          rulesJson.value = JSON.stringify(defaultRules(), null, 2);
          await ensureToken();
          await loadTemplates();
          await loadRuleSets();
          document.querySelector("#templateId").addEventListener("change", syncVersions);
          document.querySelector("#logicForm").addEventListener("submit", createRuleSet);
          document.querySelector("#previewForm").addEventListener("submit", preview);
          document.querySelector("#reloadButton").addEventListener("click", () => init().catch((error) => showMessage(error.message, "error")));
        } catch (error) {
          showMessage(error.message, "error");
        }
      }
      init();
    </script>
    <script src="detail-shell.js?v=remove-header-nav-1"></script>
  </body>
</html>
