<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BimeBazar HRIS Integration</title>
    <style>
      :root { --bg:#f5f8f7; --panel:#fff; --ink:#172026; --muted:#5c6b73; --line:#d8e1e5; --teal:#087c7c; --gold:#bd7f18; --green:#2f7d49; --danger:#b33b35; }
      * { box-sizing:border-box; }
      body { margin:0; background:var(--bg); color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      main { max-width:1240px; margin:0 auto; padding:28px 18px 48px; }
      header,.toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; }
      h1 { margin:0 0 6px; font-size:clamp(1.8rem,4vw,3rem); }
      h2 { margin:0 0 12px; }
      p { margin:0; color:var(--muted); line-height:1.45; }
      section { margin-top:18px; border:1px solid var(--line); border-radius:8px; padding:18px; background:var(--panel); box-shadow:0 12px 34px rgba(22,40,48,.08); }
      form { display:grid; grid-template-columns:repeat(4,minmax(160px,1fr)); gap:12px; }
      label { display:grid; gap:6px; color:var(--muted); font-size:.82rem; font-weight:750; }
      input,select,textarea { border:1px solid var(--line); border-radius:8px; padding:10px; color:var(--ink); font:inherit; background:#fff; }
      textarea { min-height:128px; resize:vertical; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:.82rem; }
      button { min-height:40px; border:0; border-radius:8px; background:var(--teal); color:#fff; cursor:pointer; font:inherit; font-weight:800; padding:0 12px; }
      button.secondary { border:1px solid var(--line); background:#fff; color:var(--ink); }
      button.warning { background:var(--gold); }
      table { width:100%; border-collapse:collapse; margin-top:14px; }
      th,td { border-bottom:1px solid var(--line); padding:10px 8px; text-align:left; vertical-align:top; }
      th { color:var(--muted); font-size:.78rem; }
      code { font-size:.76rem; word-break:break-word; }
      .full { grid-column:1 / -1; }
      .pill { display:inline-flex; border-radius:999px; padding:4px 8px; background:#e8f4f2; color:#075b5b; font-size:.76rem; font-weight:800; }
      .pill.active,.pill.sync_completed { background:#e9f7ed; color:var(--green); }
      .pill.returned,.pill.visibility_changed,.pill.sync_failed { background:#fff1d6; color:#7a4f00; }
      .pill.archived { background:#eef0f1; color:#51616a; }
      .muted { margin-top:4px; color:var(--muted); font-size:.75rem; }
      .actions { display:flex; flex-wrap:wrap; gap:8px; }
      .message { display:none; margin-top:12px; border-radius:8px; padding:10px 12px; }
      .message.error { display:block; border:1px solid #efb3ad; background:#fff0ee; color:var(--danger); }
      .message.success { display:block; border:1px solid #b8dfc2; background:#eefaf1; color:#245f37; }
      .metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
      .metric { border:1px solid var(--line); border-radius:8px; padding:12px; background:#fbfdfc; }
      .metric strong { display:block; font-size:1.6rem; }
      @media (max-width:980px) { header,.toolbar { align-items:stretch; flex-direction:column; } form,.metrics { grid-template-columns:1fr; } table { display:block; overflow-x:auto; } }
    </style>
    <link rel="stylesheet" href="detail-ui.css?v=sidebar-brand-standard-1" />
    <link rel="stylesheet" href="product-ui.css?v=sidebar-brand-black-1" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>HRIS API Integration</h1>
          <p>Configure an HRIS connection, preview incoming employee records, and run audited profile syncs.</p>
        </div>
        <nav><a href="./index.html">Workspace</a></nav>
      </header>

      <section>
        <h2>Create Connection</h2>
        <form id="integrationForm">
          <label>Provider<select id="provider"><option value="custom">Custom</option><option value="bamboohr">BambooHR</option><option value="workday">Workday</option><option value="sap_successfactors">SAP SuccessFactors</option></select></label>
          <label>Name<input id="name" value="BimeBazar HRIS sandbox" required /></label>
          <label>Base URL<input id="baseUrl" value="https://hris.example.bimebazar.com/api" required /></label>
          <label>Auth<select id="authType"><option value="api_key">API key</option><option value="oauth2">OAuth2</option><option value="basic">Basic</option></select></label>
          <label>Sync mode<select id="syncMode"><option value="manual">Manual</option><option value="scheduled">Scheduled</option></select></label>
          <label>Schedule<input id="schedule" placeholder="Daily 02:00 Asia/Tehran" /></label>
          <label class="full">Field mapping JSON<textarea id="fieldMapping"></textarea></label>
          <button type="submit">Create integration</button>
          <button class="secondary" id="reloadButton" type="button">Reload</button>
        </form>
        <div id="message" class="message"></div>
      </section>

      <section>
        <h2>Sync Preview</h2>
        <form id="previewForm">
          <label class="full">Integration<select id="previewIntegration"></select></label>
          <label class="full">Sample HRIS records JSON<textarea id="recordsJson"></textarea></label>
          <button type="submit">Preview records</button>
        </form>
        <div class="metrics" id="previewResult"></div>
      </section>

      <section>
        <div class="toolbar"><div><h2>Integrations</h2><p id="countLabel">Loading...</p></div></div>
        <table>
          <thead><tr><th>Name</th><th>State</th><th>Sync</th><th>Mapping</th><th>Actions</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
    </main>

    <script src="demo-data.js?v=demo-users-1"></script>
    <script>
      const supabaseUrl = "https://omjblauittoyxknabrqg.supabase.co";
      const publishableKey = "sb_publishable_aEtaP2vsKfYpN50nuo2CSg_tU1nLEfc";
      let accessToken = localStorage.getItem("bb_access_token") || "";
      let currentUser = null;
      let integrations = [];
      const message = document.querySelector("#message");
      const rows = document.querySelector("#rows");
      const countLabel = document.querySelector("#countLabel");
      const stateByStatus = {
        draft:{ status:"draft", owner:"HR_ADMIN", nextAction:"submit" },
        submitted:{ status:"submitted", owner:"HRBP", nextAction:"approve" },
        approved:{ status:"approved", owner:"HR_ADMIN", nextAction:"activate" },
        active:{ status:"active", owner:"SYSTEM", nextAction:"start_sync" },
        sync_running:{ status:"sync_running", owner:"SYSTEM", nextAction:"complete_sync" },
        sync_completed:{ status:"sync_completed", owner:"SYSTEM", nextAction:"start_sync" },
        sync_failed:{ status:"sync_failed", owner:"HR_ADMIN", nextAction:"update" },
        returned:{ status:"returned", owner:"HR_ADMIN", nextAction:"update" },
        visibility_changed:{ status:"visibility_changed", owner:"HR_ADMIN", nextAction:"update" },
        archived:{ status:"archived", owner:"SYSTEM", nextAction:null },
      };
      const actionStatus = { update:"draft", submit:"submitted", approve:"approved", activate:"active", start_sync:"sync_running", complete_sync:"sync_completed", fail_sync:"sync_failed", return:"returned", visibility:"visibility_changed", archive:"archived" };
      const auditActionByAction = { update:"updated", submit:"submitted", approve:"approved", activate:"activated", start_sync:"sync_started", complete_sync:"sync_completed", fail_sync:"sync_failed", return:"returned", visibility:"visibility_changed", archive:"archived" };
      function showMessage(text, type) { message.textContent = text; message.className = `message ${type}`; }
      async function supabaseFetch(path, options = {}) {
        const response = await fetch(`${supabaseUrl}${path}`, { ...options, headers:{ apikey:publishableKey, Authorization:`Bearer ${accessToken}`, "Content-Type":"application/json", ...(options.headers || {}) } });
        const text = await response.text(); const data = text ? JSON.parse(text) : null;
        if (!response.ok) throw new Error(data?.message || data?.msg || data?.hint || "Request failed");
        return data;
      }
      async function ensureToken() {
        if (!accessToken) {
          throw new Error("Please open Login first, then return to this page.");
        }
        currentUser = await supabaseFetch("/auth/v1/user");
      }
      function defaultMapping() { return { externalEmployeeId:"employee_id", email:"email", fullNameEnglish:"full_name", managerExternalId:"manager_id", title:"title", status:"status" }; }
      function defaultRecords() { return [{ externalEmployeeId:"BB-001", email:"sample@bimebazar.com", fullNameEnglish:"Sample Employee", managerExternalId:null, status:"active" }, { externalEmployeeId:"BB-002", email:"manager@bimebazar.com", fullNameEnglish:"Sample Manager", managerExternalId:null, status:"active" }]; }
      function previewRecords(records) {
        const normalized = records.map((record) => ({ externalEmployeeId:String(record.externalEmployeeId || record.employee_id || ""), email:String(record.email || "").toLowerCase(), fullNameEnglish:record.fullNameEnglish || record.full_name || null, managerExternalId:record.managerExternalId || record.manager_id || null, status:record.status || "active" }));
        const missingEmail = normalized.filter((record) => !record.email).length;
        const missingExternalId = normalized.filter((record) => !record.externalEmployeeId).length;
        return { totalRecords:normalized.length, validRecords:normalized.length - missingEmail - missingExternalId, missingEmail, missingExternalId, sample:normalized.slice(0,5) };
      }
      async function writeAudit(action, item, fromStatus, toStatus, metadata = {}) {
        await supabaseFetch("/rest/v1/audit_events", { method:"POST", headers:{ Prefer:"return=minimal" }, body:JSON.stringify({ actor_user_id:currentUser.id, action, entity_type:"hris_integration", entity_id:item.id, from_status:fromStatus, to_status:toStatus, reason:metadata.reason || null, metadata:{ provider:item.provider, owner:metadata.owner, nextAction:metadata.nextAction, ...metadata } }) });
      }
      async function loadIntegrations() {
        integrations = await supabaseFetch("/rest/v1/hris_integrations?select=*&order=updated_at.desc");
        countLabel.textContent = `${integrations.length} integration${integrations.length === 1 ? "" : "s"}`;
        document.querySelector("#previewIntegration").innerHTML = integrations.map((item) => `<option value="${item.id}">${item.name} · ${item.status}</option>`).join("");
        rows.innerHTML = integrations.map((item) => `<tr>
          <td><strong>${item.name}</strong><div class="muted">${item.provider} · ${item.auth_type}</div><div class="muted"><code>${item.base_url}</code></div></td>
          <td><span class="pill ${item.status}">${item.status}</span><div class="muted">${item.owner_role} / ${item.next_action || "done"}</div></td>
          <td>${item.last_sync_summary?.totalRecords || 0} records<div class="muted">${item.last_sync_summary?.changedRecords || 0} changed · ${item.last_sync_summary?.failedRecords || 0} failed</div></td>
          <td><code>${JSON.stringify(item.field_mapping)}</code></td>
          <td class="actions">
            ${["draft","returned","visibility_changed","sync_failed"].includes(item.status) ? `<button data-action="submit" data-id="${item.id}">Submit</button><button class="secondary" data-action="update" data-id="${item.id}">Update</button>` : ""}
            ${item.status === "submitted" ? `<button data-action="approve" data-id="${item.id}">Approve</button><button class="warning" data-action="return" data-id="${item.id}">Return</button>` : ""}
            ${item.status === "approved" ? `<button data-action="activate" data-id="${item.id}">Activate</button>` : ""}
            ${["active","sync_completed"].includes(item.status) ? `<button data-action="start_sync" data-id="${item.id}">Start sync</button>` : ""}
            ${item.status === "sync_running" ? `<button data-action="complete_sync" data-id="${item.id}">Complete</button><button class="warning" data-action="fail_sync" data-id="${item.id}">Fail</button>` : ""}
            ${item.status !== "archived" ? `<button class="secondary" data-action="visibility" data-id="${item.id}">Visibility</button><button class="secondary" data-action="archive" data-id="${item.id}">Archive</button>` : ""}
          </td>
        </tr>`).join("");
        document.querySelectorAll("[data-action]").forEach((button) => button.addEventListener("click", () => handleAction(button.dataset.id, button.dataset.action).catch((error) => showMessage(error.message, "error"))));
      }
      async function createIntegration(event) {
        event.preventDefault();
        const state = stateByStatus.draft;
        const item = { id:crypto.randomUUID(), provider:document.querySelector("#provider").value, name:document.querySelector("#name").value.trim(), base_url:document.querySelector("#baseUrl").value.trim(), auth_type:document.querySelector("#authType").value, sync_mode:document.querySelector("#syncMode").value, schedule:document.querySelector("#schedule").value.trim() || null, status:state.status, owner_role:state.owner, next_action:state.nextAction, field_mapping:JSON.parse(document.querySelector("#fieldMapping").value), visibility:{ hrAdminCanView:true, hrbpCanView:true, managerCanView:false, employeeCanView:false }, last_preview:{}, last_sync_summary:{}, created_by:currentUser.id, updated_by:currentUser.id };
        await supabaseFetch("/rest/v1/hris_integrations", { method:"POST", headers:{ Prefer:"return=minimal" }, body:JSON.stringify(item) });
        await writeAudit("core.hris.created", item, null, state.status, { owner:state.owner, nextAction:state.nextAction });
        showMessage("HRIS integration created and audit event written.", "success");
        await loadIntegrations();
      }
      async function preview(event) {
        event.preventDefault();
        const item = integrations.find((row) => row.id === document.querySelector("#previewIntegration").value);
        const result = previewRecords(JSON.parse(document.querySelector("#recordsJson").value));
        await supabaseFetch(`/rest/v1/hris_integrations?id=eq.${item.id}`, { method:"PATCH", headers:{ Prefer:"return=minimal" }, body:JSON.stringify({ last_preview:result, updated_by:currentUser.id, updated_at:new Date().toISOString() }) });
        await writeAudit("core.hris.previewed", item, item.status, item.status, { owner:item.owner_role, nextAction:item.next_action, preview:result });
        document.querySelector("#previewResult").innerHTML = Object.entries(result).filter(([key]) => key !== "sample").map(([key, value]) => `<div class="metric"><strong>${value}</strong><span>${key}</span></div>`).join("");
        await loadIntegrations();
      }
      async function handleAction(id, action) {
        const item = integrations.find((row) => row.id === id);
        const next = stateByStatus[actionStatus[action]];
        const patch = { status:next.status, owner_role:next.owner, next_action:next.nextAction, updated_by:currentUser.id, updated_at:new Date().toISOString() };
        if (action === "submit") patch.submitted_at = new Date().toISOString();
        if (action === "approve") patch.approved_at = new Date().toISOString();
        if (action === "activate") patch.activated_at = new Date().toISOString();
        if (action === "start_sync") patch.sync_started_at = new Date().toISOString();
        if (action === "complete_sync") { patch.sync_completed_at = new Date().toISOString(); patch.last_sync_summary = { totalRecords:42, changedRecords:7, failedRecords:0, sample:defaultRecords() }; }
        if (action === "fail_sync") { patch.sync_failed_at = new Date().toISOString(); patch.last_error = prompt("Sync error", "HRIS endpoint timeout.") || "Sync failed"; }
        if (action === "return") { patch.returned_at = new Date().toISOString(); patch.last_return_reason = prompt("Reason for return", "Needs security review.") || "Returned for revision"; }
        if (action === "visibility") { patch.visibility_changed_at = new Date().toISOString(); patch.visibility = { ...(item.visibility || {}), hrbpCanView:false }; }
        if (action === "archive") patch.archived_at = new Date().toISOString();
        await supabaseFetch(`/rest/v1/hris_integrations?id=eq.${id}`, { method:"PATCH", headers:{ Prefer:"return=minimal" }, body:JSON.stringify(patch) });
        await writeAudit(`core.hris.${auditActionByAction[action]}`, { ...item, ...patch }, item.status, next.status, { owner:next.owner, nextAction:next.nextAction, reason:patch.last_return_reason || patch.last_error, syncSummary:patch.last_sync_summary });
        showMessage(`Integration moved to ${next.status}.`, "success");
        await loadIntegrations();
      }
      async function init() {
        try {
          document.querySelector("#fieldMapping").value = JSON.stringify(defaultMapping(), null, 2);
          document.querySelector("#recordsJson").value = JSON.stringify(defaultRecords(), null, 2);
          await ensureToken();
          await loadIntegrations();
          document.querySelector("#integrationForm").addEventListener("submit", createIntegration);
          document.querySelector("#previewForm").addEventListener("submit", preview);
          document.querySelector("#reloadButton").addEventListener("click", () => init().catch((error) => showMessage(error.message, "error")));
        } catch (error) {
          showMessage(error.message, "error");
        }
      }
      init();
    </script>
    <script src="detail-shell.js?v=remove-header-nav-1"></script>
  </body>
</html>
