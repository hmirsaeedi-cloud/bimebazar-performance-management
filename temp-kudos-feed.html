<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BimeBazar Kudos Feed</title>
    <style>
      :root { --bg:#f5f8f7; --panel:#fff; --ink:#172026; --muted:#5c6b73; --line:#d8e1e5; --teal:#087c7c; --gold:#bd7f18; --green:#2f7d49; --danger:#b33b35; }
      * { box-sizing:border-box; }
      body { margin:0; background:var(--bg); color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      main { max-width:1240px; margin:0 auto; padding:28px 18px 48px; }
      header,.toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; }
      h1 { margin:0 0 6px; font-size:clamp(1.8rem,4vw,3rem); }
      h2 { margin:0 0 12px; }
      p { margin:0; color:var(--muted); line-height:1.45; }
      a { color:var(--teal); font-weight:800; }
      section { margin-top:18px; border:1px solid var(--line); border-radius:8px; padding:18px; background:var(--panel); box-shadow:0 12px 34px rgba(22,40,48,.08); }
      form { display:grid; grid-template-columns:repeat(4,minmax(160px,1fr)); gap:12px; }
      label { display:grid; gap:6px; color:var(--muted); font-size:.82rem; font-weight:750; }
      input,select,textarea { border:1px solid var(--line); border-radius:8px; min-height:40px; padding:8px 10px; color:var(--ink); font:inherit; background:#fff; }
      textarea { min-height:88px; resize:vertical; }
      button { min-height:38px; border:0; border-radius:8px; background:var(--teal); color:#fff; cursor:pointer; font:inherit; font-weight:800; padding:0 12px; }
      button.secondary { border:1px solid var(--line); background:#fff; color:var(--ink); }
      button.warning { background:var(--gold); }
      table { width:100%; border-collapse:collapse; margin-top:14px; }
      th,td { border-bottom:1px solid var(--line); padding:10px 8px; text-align:left; vertical-align:top; }
      th { color:var(--muted); font-size:.78rem; }
      code { font-size:.76rem; word-break:break-word; }
      .full { grid-column:1 / -1; }
      .pill { display:inline-flex; border-radius:999px; padding:4px 8px; background:#e8f4f2; color:#075b5b; font-size:.76rem; font-weight:800; margin:2px 4px 2px 0; }
      .pill.published,.pill.approved { background:#e9f7ed; color:var(--green); }
      .pill.submitted,.pill.returned,.pill.visibility_changed { background:#fff1d6; color:#7a4f00; }
      .pill.archived { background:#eef0f1; color:#51616a; }
      .muted { margin-top:4px; color:var(--muted); font-size:.75rem; }
      .actions { display:flex; flex-wrap:wrap; gap:8px; }
      .message { display:none; margin-top:12px; border-radius:8px; padding:10px 12px; }
      .message.error { display:block; border:1px solid #efb3ad; background:#fff0ee; color:var(--danger); }
      .message.success { display:block; border:1px solid #b8dfc2; background:#eefaf1; color:#245f37; }
      @media (max-width:980px) { header,.toolbar { align-items:stretch; flex-direction:column; } form { grid-template-columns:1fr; } table { display:block; overflow-x:auto; } }
    </style>
    <link rel="stylesheet" href="detail-ui.css?v=sidebar-brand-standard-1" />
    <link rel="stylesheet" href="product-ui.css?v=sidebar-brand-black-1" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Kudos Feed</h1>
          <p>Create real-time recognition posts, review them, and publish them to a visible feedback feed.</p>
        </div>
        <nav><a href="/index.html">Workspace</a></nav>
      </header>

      <section>
        <h2>Create Kudos</h2>
        <form id="kudosForm">
          <label>Recipient<select id="recipientUserId" required></select></label>
          <label>Title<input id="title" value="Customer-first kudos" required /></label>
          <label>Tags<input id="tags" value="customer, teamwork" /></label>
          <label>Feed visibility<select id="feedCanView"><option value="true">Visible</option><option value="false">Private</option></select></label>
          <label class="full">Message<textarea id="messageText" required>Thank you for turning a difficult customer moment into a calm, helpful experience.</textarea></label>
          <button type="submit">Create kudos</button>
          <button class="secondary" id="reloadButton" type="button">Reload</button>
        </form>
        <div id="message" class="message"></div>
      </section>

      <section>
        <div class="toolbar">
          <div><h2>Feed Items</h2><p id="countLabel">Loading...</p></div>
          <p id="liveLabel">Auto-refresh on</p>
        </div>
        <table>
          <thead><tr><th>Kudos</th><th>People</th><th>State</th><th>Visibility</th><th>Actions</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
    </main>

    <script src="demo-data.js?v=demo-users-1"></script>
    <script>
      const supabaseUrl = "https://omjblauittoyxknabrqg.supabase.co";
      const publishableKey = "sb_publishable_aEtaP2vsKfYpN50nuo2CSg_tU1nLEfc";
      let accessToken = localStorage.getItem("bb_access_token") || "";
      let currentUser = null;
      let profiles = [];
      let kudos = [];
      const rows = document.querySelector("#rows");
      const message = document.querySelector("#message");
      const countLabel = document.querySelector("#countLabel");
      const states = {
        draft:{ status:"draft", owner:"AUTHOR", nextAction:"submit" },
        submitted:{ status:"submitted", owner:"HRBP", nextAction:"approve" },
        approved:{ status:"approved", owner:"HRBP", nextAction:"publish" },
        published:{ status:"published", owner:"FEED", nextAction:null },
        returned:{ status:"returned", owner:"AUTHOR", nextAction:"update" },
        visibility_changed:{ status:"visibility_changed", owner:"HRBP", nextAction:"update" },
        archived:{ status:"archived", owner:"SYSTEM", nextAction:null },
      };
      function showMessage(text, type) { message.textContent = text; message.className = `message ${type}`; }
      async function supabaseFetch(path, options = {}) {
        const response = await fetch(`${supabaseUrl}${path}`, { ...options, headers:{ apikey:publishableKey, Authorization:`Bearer ${accessToken}`, "Content-Type":"application/json", ...(options.headers || {}) } });
        const text = await response.text(); const data = text ? JSON.parse(text) : null;
        if (!response.ok) throw new Error(data?.message || data?.msg || data?.hint || "Request failed");
        return data;
      }
      async function ensureToken() {
        if (!accessToken) {
          throw new Error("Please open Login first, then return to this page.");
        }
        currentUser = await supabaseFetch("/auth/v1/user");
      }
      function profileName(id) {
        const profile = profiles.find((item) => item.id === id);
        return profile ? `${profile.employee_id || ""} ${profile.full_name_english || profile.display_name || profile.email}`.trim() : "Unknown";
      }
      async function writeAudit(action, item, fromStatus, toStatus, metadata = {}) {
        await supabaseFetch("/rest/v1/audit_events", { method:"POST", headers:{ Prefer:"return=minimal" }, body:JSON.stringify({ actor_user_id:currentUser.id, target_user_id:item.recipient_user_ids?.[0] || item.author_user_id, action, entity_type:"kudos_feed_item", entity_id:item.id, from_status:fromStatus, to_status:toStatus, reason:metadata.reason || null, metadata:{ authorUserId:item.author_user_id, recipientUserIds:item.recipient_user_ids, owner:metadata.owner, nextAction:metadata.nextAction, tags:item.tags, ...metadata } }) });
      }
      async function loadProfiles() {
        profiles = await supabaseFetch("/rest/v1/profiles?select=id,email,display_name,full_name_english,employee_id,account_status&account_status=eq.active&order=employee_id.asc");
        document.querySelector("#recipientUserId").innerHTML = profiles.filter((profile) => profile.id !== currentUser.id).map((profile) => `<option value="${profile.id}">${profileName(profile.id)}</option>`).join("");
      }
      async function loadKudos(silent = false) {
        kudos = await supabaseFetch("/rest/v1/kudos_feed_items?select=*&order=updated_at.desc");
        countLabel.textContent = `${kudos.length} kudos item${kudos.length === 1 ? "" : "s"}`;
        rows.innerHTML = kudos.map((item) => `<tr>
          <td><strong>${item.title}</strong><p>${item.message}</p><div>${(item.tags || []).map((tag) => `<span class="pill">${tag}</span>`).join("")}</div><div class="muted"><code>${item.id}</code></div></td>
          <td>From: ${profileName(item.author_user_id)}<div class="muted">To: ${(item.recipient_user_ids || []).map(profileName).join(", ")}</div></td>
          <td><span class="pill ${item.status}">${item.status}</span><div class="muted">${item.owner_role} / ${item.next_action || "done"}</div></td>
          <td><code>${JSON.stringify(item.visibility || {})}</code></td>
          <td class="actions">
            ${["draft","returned","visibility_changed"].includes(item.status) ? `<button data-action="submit" data-id="${item.id}">Submit</button>` : ""}
            ${item.status === "submitted" ? `<button data-action="approve" data-id="${item.id}">Approve</button><button class="warning" data-action="return" data-id="${item.id}">Return</button>` : ""}
            ${item.status === "approved" ? `<button data-action="publish" data-id="${item.id}">Publish</button>` : ""}
            ${item.status !== "archived" ? `<button class="secondary" data-action="visibility" data-id="${item.id}">Visibility</button><button class="secondary" data-action="archive" data-id="${item.id}">Archive</button>` : ""}
          </td>
        </tr>`).join("");
        document.querySelectorAll("[data-action]").forEach((button) => button.addEventListener("click", () => handleAction(button.dataset.id, button.dataset.action).catch((error) => showMessage(error.message, "error"))));
        if (!silent) showMessage("Kudos feed loaded. Deactivated users are excluded from recipient search.", "success");
      }
      async function createKudos(event) {
        event.preventDefault();
        const state = states.draft;
        const item = { id:crypto.randomUUID(), author_user_id:currentUser.id, recipient_user_ids:[document.querySelector("#recipientUserId").value], status:state.status, owner_role:state.owner, next_action:state.nextAction, title:document.querySelector("#title").value.trim(), message:document.querySelector("#messageText").value.trim().replace(/\s+/g, " "), tags:document.querySelector("#tags").value.split(",").map((tag) => tag.trim()).filter(Boolean), visibility:{ feedCanView:document.querySelector("#feedCanView").value === "true", recipientCanView:true, managerCanView:true, hrbpCanView:true }, created_by:currentUser.id, updated_by:currentUser.id };
        await supabaseFetch("/rest/v1/kudos_feed_items", { method:"POST", headers:{ Prefer:"return=minimal" }, body:JSON.stringify(item) });
        await writeAudit("feedback.kudos.created", item, null, state.status, { owner:state.owner, nextAction:state.nextAction });
        showMessage("Kudos created and audit event written.", "success");
        await loadKudos(true);
      }
      async function handleAction(id, action) {
        const item = kudos.find((row) => row.id === id);
        const statusByAction = { submit:"submitted", approve:"approved", publish:"published", return:"returned", visibility:"visibility_changed", archive:"archived" };
        const next = states[statusByAction[action]];
        const patch = { status:next.status, owner_role:next.owner, next_action:next.nextAction, updated_by:currentUser.id, updated_at:new Date().toISOString() };
        if (action === "submit") patch.submitted_at = new Date().toISOString();
        if (action === "approve") patch.approved_at = new Date().toISOString();
        if (action === "publish") patch.published_at = new Date().toISOString();
        if (action === "return") { patch.returned_at = new Date().toISOString(); patch.last_return_reason = prompt("Reason for return", "Please make the recognition more specific.") || "Returned for revision"; }
        if (action === "visibility") { patch.visibility_changed_at = new Date().toISOString(); patch.visibility = { ...(item.visibility || {}), feedCanView:!(item.visibility?.feedCanView === false) }; }
        if (action === "archive") patch.archived_at = new Date().toISOString();
        await supabaseFetch(`/rest/v1/kudos_feed_items?id=eq.${id}`, { method:"PATCH", headers:{ Prefer:"return=minimal" }, body:JSON.stringify(patch) });
        await writeAudit(`feedback.kudos.${action === "publish" ? "published" : action}`, { ...item, ...patch }, item.status, next.status, { owner:next.owner, nextAction:next.nextAction, reason:patch.last_return_reason });
        showMessage(`Kudos moved to ${next.status}.`, "success");
        await loadKudos(true);
      }
      async function init() {
        try {
          await ensureToken();
          await loadProfiles();
          await loadKudos(true);
          document.querySelector("#kudosForm").addEventListener("submit", createKudos);
          document.querySelector("#reloadButton").addEventListener("click", () => loadKudos().catch((error) => showMessage(error.message, "error")));
          setInterval(() => loadKudos(true).catch(() => {}), 5000);
        } catch (error) {
          showMessage(error.message, "error");
        }
      }
      init();
    </script>
    <script src="detail-shell.js?v=remove-header-nav-1"></script>
  </body>
</html>
