<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BimeBazar MPA Workflow</title>
    <style>
      :root {
        --bg: #f5f8f7;
        --panel: #ffffff;
        --ink: #172026;
        --muted: #5c6b73;
        --line: #d8e1e5;
        --teal: #0c7c7c;
        --gold: #c48922;
        --danger: #b13d3a;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 28px 18px 48px;
      }

      header,
      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      h1 { margin: 0 0 6px; font-size: clamp(1.8rem, 4vw, 3rem); }
      h2 { margin: 0 0 12px; }
      p { margin: 0; color: var(--muted); }

      section {
        margin-top: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        background: var(--panel);
        box-shadow: 0 12px 36px rgba(22, 40, 48, 0.08);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(160px, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 750;
      }

      input,
      select,
      textarea {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        color: var(--ink);
        font: inherit;
      }

      textarea { min-height: 92px; resize: vertical; }

      button {
        min-height: 40px;
        border: 0;
        border-radius: 8px;
        background: var(--teal);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      button.secondary { border: 1px solid var(--line); background: #fff; color: var(--ink); }
      button.warning { background: var(--gold); }
      button.danger { background: var(--danger); }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 14px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 11px 8px;
        text-align: left;
        vertical-align: top;
      }

      th { color: var(--muted); font-size: 0.78rem; }

      .pill {
        display: inline-flex;
        border-radius: 999px;
        padding: 4px 8px;
        background: #e8f4f2;
        color: #075b5b;
        font-size: 0.76rem;
        font-weight: 800;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .message {
        display: none;
        margin-top: 12px;
        border-radius: 8px;
        padding: 10px 12px;
      }

      .message.error { display: block; border: 1px solid #efb3ad; background: #fff0ee; color: var(--danger); }
      .message.success { display: block; border: 1px solid #b8dfc2; background: #eefaf1; color: #245f37; }

      @media (max-width: 860px) {
        header,
        .toolbar { align-items: stretch; flex-direction: column; }
        .grid { grid-template-columns: 1fr; }
        table { display: block; overflow-x: auto; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>MPA Workflow</h1>
          <p>Temporary screen for manager-created agreements and employee approval.</p>
        </div>
        <nav>
          <a href="/temp-profiles.html">Profiles</a>
          <a href="/temp-form-builder.html" style="margin-left: 12px">Form builder</a>
        </nav>
      </header>

      <section>
        <h2>Create Cycle</h2>
        <form id="cycleForm" class="grid">
          <label>Cycle Name<input id="cycleName" value="1403 Performance Cycle" required /></label>
          <label>Starts On (Jalali)<input id="startsOn" value="1403-01-01" required /></label>
          <label>Ends On (Jalali)<input id="endsOn" value="1403-12-29" required /></label>
          <button type="submit">Create cycle</button>
        </form>
      </section>

      <section>
        <h2>Create MPA</h2>
        <form id="mpaForm" class="grid">
          <label>Employee<select id="employeeId" required></select></label>
          <label>Cycle<select id="cycleId" required></select></label>
          <label>Title<input id="title" value="Performance agreement" required /></label>
          <label>Goal<input id="goalTitle" value="Improve claim conversion" required /></label>
          <label>Measure<input id="goalMeasure" value="Increase qualified conversion by 10%" required /></label>
          <label>Weight<input id="goalWeight" type="number" value="40" min="0" max="100" /></label>
          <button type="submit">Create draft MPA</button>
          <button class="secondary" id="refreshButton" type="button">Refresh</button>
        </form>
        <div id="message" class="message"></div>
      </section>

      <section>
        <div class="toolbar">
          <div>
            <h2>MPAs</h2>
            <p id="countLabel">Loading...</p>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Employee</th>
              <th>Cycle</th>
              <th>Status</th>
              <th>Owner</th>
              <th>Next Action</th>
              <th>Move</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
    </main>

    <script>
      const supabaseUrl = "https://omjblauittoyxknabrqg.supabase.co";
      const publishableKey = "sb_publishable_aEtaP2vsKfYpN50nuo2CSg_tU1nLEfc";
      let accessToken = localStorage.getItem("bb_access_token") || "";
      let currentUser = null;
      let profiles = [];
      let cycles = [];

      const message = document.querySelector("#message");
      const rows = document.querySelector("#rows");
      const countLabel = document.querySelector("#countLabel");

      const jalaliBreaks = [-61, 9, 38, 199, 426, 686, 756, 818, 1111, 1181, 1210, 1635, 2060, 2097, 2192, 2262, 2324, 2394, 2456, 3178];
      const div = (a, b) => ~~(a / b);
      const mod = (a, b) => a - ~~(a / b) * b;
      const pad2 = (value) => String(value).padStart(2, "0");

      function jalCal(jy) {
        let leapJ = -14;
        let jp = jalaliBreaks[0];
        let jm = 0;
        let jump = 0;
        if (jy < jp || jy >= jalaliBreaks[jalaliBreaks.length - 1]) throw new Error("Jalali year is out of supported range");
        for (let i = 1; i < jalaliBreaks.length; i += 1) {
          jm = jalaliBreaks[i];
          jump = jm - jp;
          if (jy < jm) break;
          leapJ += div(jump, 33) * 8 + div(mod(jump, 33), 4);
          jp = jm;
        }
        let n = jy - jp;
        leapJ += div(n, 33) * 8 + div(mod(n, 33) + 3, 4);
        if (mod(jump, 33) === 4 && jump - n === 4) leapJ += 1;
        const gy = jy + 621;
        const leapG = div(gy, 4) - div((div(gy, 100) + 1) * 3, 4) - 150;
        const march = 20 + leapJ - leapG;
        return { gy, march };
      }

      function g2d(gy, gm, gd) {
        let d = div((gy + div(gm - 8, 6) + 100100) * 1461, 4) + div(153 * mod(gm + 9, 12) + 2, 5) + gd - 34840408;
        return d - div(div(gy + 100100 + div(gm - 8, 6), 100) * 3, 4) + 752;
      }

      function d2g(jdn) {
        let j = 4 * jdn + 139361631;
        j = j + div(div(4 * jdn + 183187720, 146097) * 3, 4) * 4 - 3908;
        const i = div(mod(j, 1461), 4) * 5 + 308;
        return { gd: div(mod(i, 153), 5) + 1, gm: mod(div(i, 153), 12) + 1, gy: div(j, 1461) - 100100 + div(8 - mod(div(i, 153), 12) - 1, 6) };
      }

      function jalaliToIsoDate(value) {
        const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(value);
        if (!match) throw new Error("Date must look like 1403-01-01");
        const jy = Number(match[1]);
        const jm = Number(match[2]);
        const jd = Number(match[3]);
        const r = jalCal(jy);
        const g = d2g(g2d(r.gy, 3, r.march) + (jm - 1) * 31 - div(jm, 7) * (jm - 7) + jd - 1);
        return `${g.gy}-${pad2(g.gm)}-${pad2(g.gd)}`;
      }

      function showMessage(text, type) {
        message.textContent = text;
        message.className = `message ${type}`;
      }

      async function supabaseFetch(path, options = {}) {
        const response = await fetch(`${supabaseUrl}${path}`, {
          ...options,
          headers: {
            apikey: publishableKey,
            Authorization: `Bearer ${accessToken}`,
            "Content-Type": "application/json",
            ...(options.headers || {}),
          },
        });
        const text = await response.text();
        const data = text ? JSON.parse(text) : null;
        if (!response.ok) throw new Error(data?.message || data?.msg || data?.hint || "Request failed");
        return data;
      }

      async function ensureToken() {
        if (!accessToken) {
          const email = prompt("Enter your BimeBazar admin email", "h.mirsaeedi@bimebazar.com");
          const password = prompt("Enter your password");
          const data = await fetch(`${supabaseUrl}/auth/v1/token?grant_type=password`, {
            method: "POST",
            headers: { apikey: publishableKey, "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          }).then(async (response) => {
            const body = await response.json();
            if (!response.ok) throw new Error(body.msg || "Login failed");
            return body;
          });
          accessToken = data.access_token;
          localStorage.setItem("bb_access_token", accessToken);
        }
        currentUser = await supabaseFetch("/auth/v1/user");
      }

      function fillSelect(select, options, label) {
        select.innerHTML = `<option value="">${label}</option>` + options.map((item) => `<option value="${item.id}">${item.display_name || item.name || item.email}</option>`).join("");
      }

      async function writeAuditEvent(action, entityId, targetUserId, fromStatus, toStatus, metadata, reason = null) {
        await supabaseFetch("/rest/v1/audit_events", {
          method: "POST",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify({
            actor_user_id: currentUser.id,
            target_user_id: targetUserId,
            action,
            entity_type: "mpa",
            entity_id: entityId,
            from_status: fromStatus,
            to_status: toStatus,
            reason,
            metadata,
          }),
        });
      }

      async function loadData() {
        [profiles, cycles] = await Promise.all([
          supabaseFetch("/rest/v1/profiles?select=id,email,display_name,manager_id,hrbp_id,account_status&account_status=eq.active&order=display_name"),
          supabaseFetch("/rest/v1/mpa_cycles?select=id,name,starts_on,ends_on,status&order=starts_on.desc"),
        ]);
        fillSelect(document.querySelector("#employeeId"), profiles, "Select employee");
        fillSelect(document.querySelector("#cycleId"), cycles, "Select cycle");
        await loadMpas();
      }

      async function loadMpas() {
        const mpas = await supabaseFetch("/rest/v1/mpas?select=id,title,employee_id,cycle_id,status,owner_role,next_action,content&order=updated_at.desc");
        countLabel.textContent = `${mpas.length} MPA${mpas.length === 1 ? "" : "s"}`;
        rows.innerHTML = mpas.map((mpa) => {
          const employee = profiles.find((profile) => profile.id === mpa.employee_id);
          const cycle = cycles.find((item) => item.id === mpa.cycle_id);
          return `
            <tr>
              <td>${mpa.title}</td>
              <td>${employee?.display_name || mpa.employee_id}</td>
              <td>${cycle?.name || mpa.cycle_id}</td>
              <td><span class="pill">${mpa.status}</span></td>
              <td>${mpa.owner_role}</td>
              <td>${mpa.next_action || ""}</td>
              <td class="actions">${renderActions(mpa)}</td>
            </tr>
          `;
        }).join("");

        document.querySelectorAll("[data-action]").forEach((button) => {
          button.addEventListener("click", () => moveMpa(button.dataset.id, button.dataset.action).catch((error) => showMessage(error.message, "error")));
        });
      }

      function renderActions(mpa) {
        const actions = {
          draft: [["submit", "Submit"]],
          returned: [["submit", "Resubmit"]],
          submitted: [["employee_approve", "Employee approve"], ["return", "Return"]],
          employee_approved: [["manager_approve", "Manager approve"], ["return", "Return"]],
          manager_approved: [["activate", "Activate"], ["return", "Return"]],
          active: [["archive", "Archive"]],
        }[mpa.status] || [];
        return actions.map(([action, label]) => `<button data-id="${mpa.id}" data-action="${action}" class="${action === "return" ? "warning" : action === "archive" ? "danger" : ""}">${label}</button>`).join("");
      }

      function nextState(status, action) {
        const table = {
          draft: { submit: ["submitted", "EMPLOYEE", "employee_approve"], archive: ["archived", "SYSTEM", null] },
          returned: { submit: ["submitted", "EMPLOYEE", "employee_approve"] },
          submitted: { employee_approve: ["employee_approved", "MANAGER", "manager_approve"], return: ["returned", "MANAGER", "submit"] },
          employee_approved: { manager_approve: ["manager_approved", "HRBP", "hrbp_activate"], return: ["returned", "MANAGER", "submit"] },
          manager_approved: { activate: ["active", "SYSTEM", null], return: ["returned", "MANAGER", "submit"] },
          active: { archive: ["archived", "SYSTEM", null] },
        };
        return table[status]?.[action];
      }

      async function moveMpa(id, action) {
        const [current] = await supabaseFetch(`/rest/v1/mpas?id=eq.${id}&select=*`);
        const next = nextState(current.status, action);
        if (!next) throw new Error(`Cannot ${action} from ${current.status}`);
        const now = new Date().toISOString();
        const timestamp = {
          submit: { submitted_at: now },
          employee_approve: { employee_approved_at: now },
          manager_approve: { manager_approved_at: now },
          activate: { activated_at: now },
          archive: { archived_at: now },
          return: {},
        }[action];
        await supabaseFetch(`/rest/v1/mpas?id=eq.${id}`, {
          method: "PATCH",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify({
            status: next[0],
            owner_role: next[1],
            next_action: next[2],
            updated_by: currentUser.id,
            updated_at: now,
            ...timestamp,
          }),
        });
        await writeAuditEvent(`mpa.${action}`, id, current.employee_id, current.status, next[0], {
          owner: next[1],
          nextAction: next[2],
          cycleId: current.cycle_id,
        });
        showMessage(`MPA moved to ${next[0]}.`, "success");
        await loadMpas();
      }

      document.querySelector("#cycleForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const cycleId = crypto.randomUUID();
          await supabaseFetch("/rest/v1/mpa_cycles", {
            method: "POST",
            headers: { Prefer: "return=minimal" },
            body: JSON.stringify({
              id: cycleId,
              name: document.querySelector("#cycleName").value,
              starts_on: jalaliToIsoDate(document.querySelector("#startsOn").value),
              ends_on: jalaliToIsoDate(document.querySelector("#endsOn").value),
              status: "active",
              created_by: currentUser.id,
            }),
          });
          showMessage("Cycle created.", "success");
          await loadData();
        } catch (error) {
          showMessage(error.message, "error");
        }
      });

      document.querySelector("#mpaForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const employee = profiles.find((profile) => profile.id === document.querySelector("#employeeId").value);
          const mpaId = crypto.randomUUID();
          const payload = {
            id: mpaId,
            employee_id: employee.id,
            manager_id: employee.manager_id || currentUser.id,
            hrbp_id: employee.hrbp_id || null,
            cycle_id: document.querySelector("#cycleId").value,
            title: document.querySelector("#title").value,
            content: {
              goals: [{
                title: document.querySelector("#goalTitle").value,
                measure: document.querySelector("#goalMeasure").value,
                weight: Number(document.querySelector("#goalWeight").value || 0),
              }],
              developmentActions: [],
            },
            status: "draft",
            owner_role: "MANAGER",
            next_action: "submit",
            created_by: currentUser.id,
            updated_by: currentUser.id,
          };
          await supabaseFetch("/rest/v1/mpas", {
            method: "POST",
            headers: { Prefer: "return=minimal" },
            body: JSON.stringify(payload),
          });
          await writeAuditEvent("mpa.created", mpaId, employee.id, null, "draft", {
            owner: "MANAGER",
            nextAction: "submit",
            cycleId: payload.cycle_id,
          });
          showMessage("Draft MPA created.", "success");
          await loadMpas();
        } catch (error) {
          showMessage(error.message, "error");
        }
      });

      document.querySelector("#refreshButton").addEventListener("click", () => loadData().catch((error) => showMessage(error.message, "error")));

      (async function init() {
        try {
          await ensureToken();
          await loadData();
        } catch (error) {
          showMessage(error.message, "error");
          countLabel.textContent = "Could not load MPAs";
        }
      })();
    </script>
  </body>
</html>
