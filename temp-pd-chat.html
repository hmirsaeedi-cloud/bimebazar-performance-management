<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BimeBazar PD Chat</title>
    <style>
      :root {
        --bg: #f6f8f4;
        --panel: #ffffff;
        --ink: #172026;
        --muted: #617079;
        --line: #d9e2df;
        --teal: #087c7c;
        --green: #2f7d4f;
        --gold: #bd7f18;
        --danger: #b33b35;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--ink); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { max-width: 1180px; margin: 0 auto; padding: 28px 18px 48px; }
      header, .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
      h1 { margin: 0 0 6px; font-size: clamp(1.8rem, 4vw, 3rem); }
      h2 { margin: 0 0 12px; }
      p { margin: 0; color: var(--muted); }
      section { margin-top: 18px; border: 1px solid var(--line); border-radius: 8px; padding: 18px; background: var(--panel); box-shadow: 0 12px 34px rgba(22, 40, 48, 0.08); }
      .grid { display: grid; grid-template-columns: 1.1fr 1fr 1fr 1.4fr; gap: 12px; }
      label { display: grid; gap: 6px; color: var(--muted); font-size: 0.82rem; font-weight: 750; }
      input, select, textarea { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 10px; color: var(--ink); font: inherit; }
      textarea { min-height: 82px; resize: vertical; }
      button { min-height: 40px; border: 0; border-radius: 8px; background: var(--teal); color: #fff; cursor: pointer; font: inherit; font-weight: 800; }
      button.secondary { border: 1px solid var(--line); background: #fff; color: var(--ink); }
      button.warning { background: var(--gold); }
      button.danger { background: var(--danger); }
      table { width: 100%; border-collapse: collapse; margin-top: 14px; }
      th, td { border-bottom: 1px solid var(--line); padding: 10px 8px; text-align: left; vertical-align: top; }
      th { color: var(--muted); font-size: 0.78rem; }
      .pill { display: inline-flex; border-radius: 999px; padding: 4px 8px; background: #e8f4f2; color: #075b5b; font-size: 0.76rem; font-weight: 800; }
      .muted { margin-top: 4px; color: var(--muted); font-size: 0.76rem; }
      .messages { display: grid; gap: 8px; min-width: 260px; }
      .bubble { border: 1px solid var(--line); border-radius: 8px; padding: 8px; background: #fbfcfb; }
      .bubble strong { color: var(--green); font-size: 0.78rem; }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; }
      .message { display: none; margin-top: 12px; border-radius: 8px; padding: 10px 12px; }
      .message.error { display: block; border: 1px solid #efb3ad; background: #fff0ee; color: var(--danger); }
      .message.success { display: block; border: 1px solid #b8dfc2; background: #eefaf1; color: #245f37; }
      @media (max-width: 880px) {
        header, .toolbar { align-items: stretch; flex-direction: column; }
        .grid { grid-template-columns: 1fr; }
        table { display: block; overflow-x: auto; }
      }
    </style>
    <link rel="stylesheet" href="detail-ui.css?v=sidebar-brand-standard-1" />
    <link rel="stylesheet" href="product-ui.css?v=flowcharts-3" />
    <link rel="stylesheet" href="workflow-guide.css?v=flowcharts-3" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>PD Chat Logging</h1>
          <p>Employee and manager development conversations with evaluation auto-attach, explicit workflow status, owner, and next action.</p>
        </div>
        <nav>
          <a href="./temp-end-cycle-evaluation.html">Evaluation</a>
          <a href="./index.html" style="margin-left: 12px">Workspace</a>
        </nav>
      </header>

      <section>
        <h2>Create Chat Log</h2>
        <form id="createForm" class="grid">
          <label>Employee<select id="employeeId" required></select></label>
          <label>Manager<select id="managerId"></select></label>
          <label>Process<select id="processId"></select></label>
          <label>Evaluation<select id="evaluationId"></select></label>
          <label>Initiated By
            <select id="initiatorRole">
              <option value="MANAGER">Manager</option>
              <option value="EMPLOYEE">Employee</option>
            </select>
          </label>
          <label>Dialogue Type
            <select id="dialogueType">
              <option value="goal_review">Goal Review</option>
              <option value="development">Development Discussion</option>
              <option value="performance_concern">Performance Concern</option>
              <option value="general">General</option>
            </select>
          </label>
          <label>Dialogue Date<input id="dialogueDate" type="date" /></label>
          <label>Topic<input id="topic" value="Quarterly development check-in" required /></label>
          <label style="grid-column: 1 / -1">First message<textarea id="messageText" required>I want to discuss growth goals and support needed for the next cycle.</textarea></label>
          <button type="submit">Create chat</button>
          <button class="secondary" id="refreshButton" type="button">Refresh</button>
        </form>
        <div id="message" class="message"></div>
      </section>

      <section>
        <div class="toolbar">
          <div>
            <h2>Chat Logs</h2>
            <p id="countLabel">Loading...</p>
          </div>
          <label>Next perspective
            <input id="followupMessage" placeholder="Write the other party's note before acting" />
          </label>
          <label>Return reason
            <input id="pdChatReason" placeholder="Required when returning a dialogue" />
          </label>
        </div>
        <table>
          <thead>
            <tr>
              <th>Topic</th>
              <th>People</th>
              <th>Status</th>
              <th>Evaluation Attachment</th>
              <th>Owner / Next</th>
              <th>Messages</th>
              <th>Move</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
    </main>

    <script src="demo-data.js?v=demo-users-1"></script>
    <script>
      const supabaseUrl = "https://omjblauittoyxknabrqg.supabase.co";
      const publishableKey = "sb_publishable_aEtaP2vsKfYpN50nuo2CSg_tU1nLEfc";
      let accessToken = localStorage.getItem("bb_access_token") || "";
      let currentUser = null;
      let profiles = [];
      let processes = [];
      let evaluations = [];
      let attachments = [];
      let chats = [];

      const message = document.querySelector("#message");
      const rows = document.querySelector("#rows");
      const countLabel = document.querySelector("#countLabel");

      function showMessage(text, type) {
        message.textContent = text;
        message.className = `message ${type}`;
      }

      async function supabaseFetch(path, options = {}) {
        const response = await fetch(`${supabaseUrl}${path}`, {
          ...options,
          headers: {
            apikey: publishableKey,
            Authorization: `Bearer ${accessToken}`,
            "Content-Type": "application/json",
            ...(options.headers || {}),
          },
        });
        const text = await response.text();
        const data = text ? JSON.parse(text) : null;
        if (!response.ok) throw new Error(data?.message || data?.msg || data?.hint || "Request failed");
        return data;
      }

      async function ensureToken() {
        if (!accessToken) {
          throw new Error("Please open Login first, then return to this page.");
        }
        currentUser = await supabaseFetch("/auth/v1/user");
      }

      function fillSelect(select, options, label, render) {
        select.innerHTML = `<option value="">${label}</option>` + options.map((item) => `<option value="${item.id}">${render(item)}</option>`).join("");
      }

      function profileName(id) {
        const profile = profiles.find((item) => item.id === id);
        return profile?.display_name || profile?.email || id || "Unassigned";
      }

      function stateFor(status, action) {
        const table = {
          draft: { update: ["active", "EMPLOYEE_MANAGER", "submit"], submit: ["submitted", "EMPLOYEE_MANAGER", "add_perspective"] },
          active: { update: ["active", "EMPLOYEE_MANAGER", "submit"], submit: ["submitted", "EMPLOYEE_MANAGER", "add_perspective"] },
          submitted: { approve: ["both_documented", "SYSTEM", "attach_to_evaluation"], return: ["returned", "EMPLOYEE_MANAGER", "update"] },
          both_documented: { archive: ["archived", "SYSTEM", null] },
          manager_reviewed: { visibility: ["visibility_approved", "EMPLOYEE_MANAGER", "archive"], return: ["returned", "EMPLOYEE", "update"], archive: ["archived", "SYSTEM", null] },
          returned: { update: ["active", "EMPLOYEE_MANAGER", "submit"], submit: ["submitted", "MANAGER", "approve"] },
          visibility_approved: { archive: ["archived", "SYSTEM", null] },
        };
        return table[status]?.[action];
      }

      function attachmentState(action, hasChat) {
        const state = hasChat
          ? { status: "attached", owner: "SYSTEM", nextAction: null }
          : { status: "missing_chat", owner: "MANAGER", nextAction: "override_attach" };
        return {
          ...state,
          action: hasChat ? "pd_chat.auto_attached_to_evaluation" : "pd_chat.auto_attach_missing",
          notificationAction: hasChat ? "attached" : "missing_chat",
          fromStatus: "matched",
          workflowAction: hasChat ? "auto_attach" : "mark_missing",
        };
      }

      async function writeAudit(action, entityId, targetUserId, fromStatus, toStatus, metadata, reason = null) {
        await supabaseFetch("/rest/v1/audit_events", {
          method: "POST",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify({
            actor_user_id: currentUser.id,
            target_user_id: targetUserId,
            action,
            entity_type: "pd_chat_log",
            entity_id: entityId,
            from_status: fromStatus,
            to_status: toStatus,
            reason,
            metadata,
          }),
        });
      }

      async function writeAttachmentAudit(action, attachment, fromStatus, toStatus, metadata) {
        await supabaseFetch("/rest/v1/audit_events", {
          method: "POST",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify({
            actor_user_id: currentUser.id,
            target_user_id: attachment.employee_id,
            action,
            entity_type: "pd_chat_evaluation_attachment",
            entity_id: attachment.id,
            from_status: fromStatus,
            to_status: toStatus,
            metadata,
          }),
        });
      }

      function newMessage(body, authorRole = "EMPLOYEE", dialogueType = "general") {
        return {
          id: crypto.randomUUID(),
          authorId: currentUser.id,
          authorRole,
          dialogueType,
          body: body.trim(),
          createdAt: new Date().toISOString(),
          editedAt: null,
          visibility: "employee_manager",
        };
      }

      async function loadData() {
        [profiles, processes, evaluations] = await Promise.all([
          supabaseFetch("/rest/v1/profiles?select=id,display_name,email,manager_id,account_status&account_status=eq.active&order=display_name"),
          supabaseFetch("/rest/v1/performance_processes?select=id,name,status,process_type&order=created_at.desc"),
          loadEvaluationOptions(),
        ]);
        fillSelect(document.querySelector("#employeeId"), profiles, "Select employee", (item) => item.display_name || item.email);
        fillSelect(document.querySelector("#managerId"), profiles, "Auto manager", (item) => item.display_name || item.email);
        fillSelect(document.querySelector("#processId"), processes, "No process", (item) => item.name);
        fillSelect(document.querySelector("#evaluationId"), evaluations, "Attach later", (item) => `${item.label} - ${profileName(item.employee_id)}`);
        await loadChats();
      }

      async function loadEvaluationOptions() {
        const [endCycle, midCycle, downward] = await Promise.all([
          supabaseFetch("/rest/v1/end_cycle_evaluations?select=id,process_id,employee_id,manager_id,status&order=updated_at.desc"),
          supabaseFetch("/rest/v1/mid_cycle_evaluations?select=id,process_id,employee_id,manager_id,status&order=updated_at.desc"),
          supabaseFetch("/rest/v1/process_downward_evaluations?select=id,process_id,employee_id,manager_id,status&order=updated_at.desc"),
        ]);
        return [
          ...endCycle.map((item) => ({ ...item, type: "end_cycle_evaluation", label: `End-cycle ${item.status}` })),
          ...midCycle.map((item) => ({ ...item, type: "mid_cycle_evaluation", label: `Mid-cycle ${item.status}` })),
          ...downward.map((item) => ({ ...item, type: "downward_evaluation", label: `Downward ${item.status}` })),
        ];
      }

      async function loadChats() {
        [chats, attachments] = await Promise.all([
          supabaseFetch("/rest/v1/pd_chat_logs?select=*&order=updated_at.desc"),
          supabaseFetch("/rest/v1/pd_chat_evaluation_attachments?select=*&order=updated_at.desc"),
        ]);
        countLabel.textContent = `${chats.length} chat log${chats.length === 1 ? "" : "s"}`;
        rows.innerHTML = chats.map((chat) => `
          <tr>
            <td>
              <strong>${chat.topic}</strong>
              ${chat.last_return_reason ? `<div class="muted">Returned: ${chat.last_return_reason}</div>` : ""}
            </td>
            <td>
              <div>Employee: ${profileName(chat.employee_id)}</div>
              <div class="muted">Manager: ${profileName(chat.manager_id)}</div>
            </td>
            <td><span class="pill">${chat.status}</span></td>
            <td>${renderAttachment(chat)}</td>
            <td>
              <div>${chat.owner_role}</div>
              <div class="muted">${chat.next_action || "No next action"}</div>
            </td>
            <td class="messages">${renderMessages(chat.messages)}</td>
            <td class="actions">${renderActions(chat)}</td>
          </tr>
        `).join("");
        document.querySelectorAll("[data-action]").forEach((button) => {
          button.addEventListener("click", () => moveChat(button.dataset.id, button.dataset.action).catch((error) => showMessage(error.message, "error")));
        });
      }

      function renderAttachment(chat) {
        const attachment = attachments.find((item) => item.pd_chat_log_id === chat.id || item.evaluation_id === chat.attached_evaluation_id);
        const evaluation = evaluations.find((item) => item.id === (attachment?.evaluation_id || chat.attached_evaluation_id || chat.evaluation_id));
        if (!attachment && !evaluation) return `<span class="muted">Not attached</span>`;
        return `
          <span class="pill">${attachment?.status || "linked"}</span>
          <div class="muted">${evaluation?.label || attachment?.evaluation_type || chat.attached_evaluation_type || "Evaluation"}</div>
          <div class="muted">${attachment?.next_action || "No next action"}</div>
        `;
      }

      function renderMessages(messages) {
        return (messages || []).slice(-3).map((item) => `
          <div class="bubble">
            <strong>${item.authorRole}</strong>
            <div>${item.body}</div>
            <div class="muted">${new Date(item.createdAt).toLocaleString("fa-IR")}</div>
          </div>
        `).join("");
      }

      function renderActions(chat) {
        const actions = {
          draft: [["update", "Add message"], ["submit", "Submit"]],
          active: [["update", "Add message"], ["submit", "Submit"]],
          returned: [["update", "Add message"], ["submit", "Resubmit"]],
          submitted: [["approve", "Add other perspective"], ["return", "Return"]],
          both_documented: [["archive", "Archive"]],
          manager_reviewed: [["visibility", "Share visibility"], ["archive", "Archive"], ["return", "Return"]],
          visibility_approved: [["archive", "Archive"]],
        }[chat.status] || [];
        const canAttach = evaluations.some((item) => item.employee_id === chat.employee_id);
        if (canAttach && chat.status !== "archived") actions.push(["attach", "Auto attach"]);
        return actions.map(([action, label]) => `<button data-id="${chat.id}" data-action="${action}" class="${action === "return" ? "warning" : action === "archive" ? "danger" : ""}">${label}</button>`).join("");
      }

      async function moveChat(id, action) {
        const [current] = await supabaseFetch(`/rest/v1/pd_chat_logs?id=eq.${id}&select=*`);
        if (action === "attach") {
          await autoAttachChat(current);
          return;
        }
        const next = stateFor(current.status, action);
        if (!next) throw new Error(`Cannot ${action} from ${current.status}`);
        const now = new Date().toISOString();
        const patch = { status: next[0], owner_role: next[1], next_action: next[2], updated_by: currentUser.id, updated_at: now };
        const metadata = { owner: next[1], nextAction: next[2], processId: current.process_id, messageCount: (current.messages || []).length };
        let reason = null;
        let auditAction = `pd_chat.${action}`;
        if (["update", "approve"].includes(action)) {
          const body = document.querySelector("#followupMessage").value.trim();
          if (!body) throw new Error("Write the next perspective before continuing.");
          const lastRole = (current.messages || []).at(-1)?.authorRole || "EMPLOYEE";
          const authorRole = lastRole === "MANAGER" ? "EMPLOYEE" : "MANAGER";
          patch.messages = [...(current.messages || []), newMessage(body, authorRole, (current.messages || [])[0]?.dialogueType || "general")];
          metadata.messageCount = patch.messages.length;
          metadata.contributingRole = authorRole;
          auditAction = action === "approve" ? "pd_chat.both_documented" : "pd_chat.updated";
        }
        if (action === "submit") {
          patch.submitted_at = now;
          auditAction = "pd_chat.submitted";
        }
        if (action === "approve") {
          patch.approved_at = now;
        }
        if (action === "return") {
          reason = document.querySelector("#pdChatReason").value.trim();
          if (!reason) throw new Error("Add the return reason first.");
          patch.returned_at = now;
          patch.last_return_reason = reason;
          auditAction = "pd_chat.returned";
        }
        if (action === "visibility") {
          patch.visibility = { employeeCanView: true, managerCanView: true, hrbpCanView: true };
          patch.visibility_changed_at = now;
          metadata.from = current.visibility;
          metadata.to = patch.visibility;
          auditAction = "pd_chat.visibility_changed";
        }
        if (action === "archive") {
          patch.archived_at = now;
          auditAction = "pd_chat.archived";
        }
        await supabaseFetch(`/rest/v1/pd_chat_logs?id=eq.${id}`, {
          method: "PATCH",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify(patch),
        });
        await writeAudit(auditAction, id, current.employee_id, current.status, next[0], metadata, reason);
        showMessage(`PD Chat moved to ${next[0]}.`, "success");
        await loadChats();
      }

      async function autoAttachChat(chat) {
        const candidates = evaluations.filter((item) => item.employee_id === chat.employee_id);
        if (!candidates.length) throw new Error("No evaluation found for this employee.");
        const preferred = candidates.find((item) => item.process_id === chat.process_id) || candidates[0];
        const matched = chat.status !== "archived" ? chat : null;
        const next = attachmentState("auto_attach", Boolean(matched));
        const attachmentId = crypto.randomUUID();
        const now = new Date().toISOString();
        const attachment = {
          id: attachmentId,
          pd_chat_log_id: matched?.id || null,
          process_id: preferred.process_id || chat.process_id || null,
          employee_id: preferred.employee_id,
          manager_id: preferred.manager_id || chat.manager_id || null,
          evaluation_type: preferred.type,
          evaluation_id: preferred.id,
          status: next.status,
          owner_role: next.owner,
          next_action: next.nextAction,
          match_strategy: preferred.process_id ? "employee_process_latest_visible" : "employee_latest_visible",
          attached_by: matched ? currentUser.id : null,
          attached_at: matched ? now : null,
          metadata: { source: "page_auto_attach", chatStatus: chat.status, workflowAction: next.workflowAction },
          updated_at: now,
        };
        await supabaseFetch("/rest/v1/pd_chat_evaluation_attachments?on_conflict=evaluation_type,evaluation_id", {
          method: "POST",
          headers: { Prefer: "resolution=merge-duplicates,return=minimal" },
          body: JSON.stringify(attachment),
        });
        if (matched) {
          await supabaseFetch(`/rest/v1/pd_chat_logs?id=eq.${chat.id}`, {
            method: "PATCH",
            headers: { Prefer: "return=minimal" },
            body: JSON.stringify({
              evaluation_id: preferred.id,
              attached_evaluation_type: preferred.type,
              attached_evaluation_id: preferred.id,
              attached_at: now,
              updated_by: currentUser.id,
              updated_at: now,
            }),
          });
          await supabaseFetch(`/rest/v1/${tableForEvaluation(preferred.type)}?id=eq.${preferred.id}`, {
            method: "PATCH",
            headers: { Prefer: "return=minimal" },
            body: JSON.stringify({ attached_pd_chat_id: chat.id, updated_at: now }),
          });
        }
        await writeAttachmentAudit(next.action, attachment, next.fromStatus, next.status, {
          chatId: matched?.id || null,
          processId: attachment.process_id,
          managerId: attachment.manager_id,
          evaluationType: preferred.type,
          evaluationId: preferred.id,
          matchStrategy: attachment.match_strategy,
          owner: next.owner,
          nextAction: next.nextAction,
        });
        showMessage(matched ? "PD Chat attached to evaluation." : "No matching PD Chat found; attachment marked missing.", "success");
        await loadChats();
      }

      function tableForEvaluation(type) {
        return {
          end_cycle_evaluation: "end_cycle_evaluations",
          mid_cycle_evaluation: "mid_cycle_evaluations",
          downward_evaluation: "process_downward_evaluations",
        }[type];
      }

      document.querySelector("#createForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const employee = profiles.find((item) => item.id === document.querySelector("#employeeId").value);
          const managerId = document.querySelector("#managerId").value || employee?.manager_id || null;
          const processId = document.querySelector("#processId").value || null;
          const evaluation = evaluations.find((item) => item.id === document.querySelector("#evaluationId").value);
          const topic = document.querySelector("#topic").value.trim();
          const body = document.querySelector("#messageText").value.trim();
          const initiatorRole = document.querySelector("#initiatorRole").value;
          const dialogueType = document.querySelector("#dialogueType").value;
          const dialogueDate = document.querySelector("#dialogueDate").value || new Date().toISOString().slice(0, 10);
          if (!employee) throw new Error("Select an employee first.");
          if (!body) throw new Error("Write the first message first.");
          const id = crypto.randomUUID();
          const state = { status: "draft", owner: initiatorRole, nextAction: "submit" };
          const messages = [newMessage(body, initiatorRole, dialogueType)];
          await supabaseFetch("/rest/v1/pd_chat_logs", {
            method: "POST",
            headers: { Prefer: "return=minimal" },
            body: JSON.stringify({
              id,
              process_id: processId,
              employee_id: employee.id,
              manager_id: managerId,
              evaluation_id: evaluation?.id || null,
              attached_evaluation_type: evaluation?.type || null,
              attached_evaluation_id: evaluation?.id || null,
              attached_at: evaluation ? new Date().toISOString() : null,
              status: state.status,
              owner_role: state.owner,
              next_action: state.nextAction,
              topic: `${topic} · ${dialogueType.replaceAll("_", " ")} · ${dialogueDate}`,
              messages,
              visibility: { employeeCanView: true, managerCanView: true, hrbpCanView: false },
              created_by: currentUser.id,
              updated_by: currentUser.id,
            }),
          });
          await writeAudit("pd_chat.created", id, employee.id, null, state.status, {
            owner: state.owner,
            nextAction: state.nextAction,
            processId,
            evaluationId: evaluation?.id || null,
            evaluationType: evaluation?.type || null,
            messageCount: messages.length,
          });
          if (evaluation) {
            await autoAttachChat({ id, process_id: processId, employee_id: employee.id, manager_id: managerId, status: state.status });
          }
          showMessage("PD Chat log created.", "success");
          await loadChats();
        } catch (error) {
          showMessage(error.message, "error");
        }
      });

      document.querySelector("#refreshButton").addEventListener("click", () => loadData().catch((error) => showMessage(error.message, "error")));

      (async function init() {
        try {
          await ensureToken();
          await loadData();
        } catch (error) {
          showMessage(error.message, "error");
          countLabel.textContent = "Could not load PD Chat logs";
        }
      })();
    </script>
    <script src="workflow-guide.js?v=flowcharts-3"></script>
    <script src="detail-shell.js?v=remove-header-nav-1"></script>
  </body>
</html>
