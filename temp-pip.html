<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BimeBazar PIP Workflow</title>
    <style>
      :root { --bg:#f5f8f7; --panel:#fff; --ink:#172026; --muted:#5c6b73; --line:#d8e1e5; --teal:#087c7c; --gold:#bd7f18; --danger:#b33b35; --green:#2e7d4f; }
      * { box-sizing:border-box; }
      body { margin:0; background:var(--bg); color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      main { max-width:1240px; margin:0 auto; padding:28px 18px 48px; }
      header,.toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; }
      h1 { margin:0 0 6px; font-size:clamp(1.8rem,4vw,3rem); }
      h2 { margin:0 0 12px; }
      p { margin:0; color:var(--muted); line-height:1.45; }
      section { margin-top:18px; border:1px solid var(--line); border-radius:8px; padding:18px; background:var(--panel); box-shadow:0 12px 34px rgba(22,40,48,.08); }
      form { display:grid; grid-template-columns:repeat(3,minmax(180px,1fr)); gap:12px; }
      label { display:grid; gap:6px; color:var(--muted); font-size:.82rem; font-weight:750; }
      input,select,textarea { border:1px solid var(--line); border-radius:8px; padding:10px; color:var(--ink); font:inherit; background:#fff; }
      textarea { min-height:92px; resize:vertical; }
      button { min-height:40px; border:0; border-radius:8px; background:var(--teal); color:#fff; cursor:pointer; font:inherit; font-weight:800; padding:0 12px; }
      button.secondary { border:1px solid var(--line); background:#fff; color:var(--ink); }
      button.warning { background:var(--gold); }
      table { width:100%; border-collapse:collapse; margin-top:14px; }
      th,td { border-bottom:1px solid var(--line); padding:10px 8px; text-align:left; vertical-align:top; }
      th { color:var(--muted); font-size:.78rem; }
      code { font-size:.76rem; word-break:break-all; }
      .full { grid-column:1 / -1; }
      .pill { display:inline-flex; border-radius:999px; padding:4px 8px; background:#e8f4f2; color:#075b5b; font-size:.76rem; font-weight:800; }
      .pill.returned { background:#fff1d6; color:#7a4f00; }
      .pill.cancelled { background:#eef0f1; color:#51616a; }
      .visibility { display:inline-flex; margin-top:6px; border-radius:999px; padding:4px 8px; background:#fff0ee; color:var(--danger); font-size:.76rem; font-weight:800; }
      .visibility.on { background:#edf8f0; color:var(--green); }
      .muted { margin-top:4px; color:var(--muted); font-size:.75rem; }
      .actions { display:flex; flex-wrap:wrap; gap:8px; }
      .message { display:none; margin-top:12px; border-radius:8px; padding:10px 12px; }
      .message.error { display:block; border:1px solid #efb3ad; background:#fff0ee; color:var(--danger); }
      .message.success { display:block; border:1px solid #b8dfc2; background:#eefaf1; color:#245f37; }
      @media (max-width:980px) { header,.toolbar { align-items:stretch; flex-direction:column; } form { grid-template-columns:1fr; } table { display:block; overflow-x:auto; } }
    </style>
    <link rel="stylesheet" href="detail-ui.css?v=sidebar-brand-standard-1" />
    <link rel="stylesheet" href="product-ui.css?v=sidebar-brand-black-1" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>PIP Workflow</h1>
          <p>Create hidden performance improvement plans, approve them with HRBP, then activate employee visibility deliberately.</p>
        </div>
        <nav><a href="./index.html">Workspace</a></nav>
      </header>

      <section>
        <h2>Create PIP Case</h2>
        <form id="createForm">
          <label>Employee<select id="employeeId" required></select></label>
          <label>Manager<select id="managerId"></select></label>
          <label>HRBP<select id="hrbpId"></select></label>
          <label>Start Date<input id="startDate" type="date" /></label>
          <label>Due Date<input id="dueDate" type="date" /></label>
          <label>Source Evaluation<input id="sourceEvaluationId" placeholder="Optional evaluation UUID" /></label>
          <label class="full">Performance Concern<textarea id="performanceConcern" required>Repeated missed delivery commitments and quality issues observed in the latest evaluation period.</textarea></label>
          <label class="full">Success Criteria<textarea id="successCriteria" required>Deliver agreed weekly milestones, meet quality expectations, and show measurable improvement across two checkpoints.</textarea></label>
          <label class="full">Support Plan<textarea id="supportPlan" required>Weekly manager check-ins, HRBP monitoring, coaching notes, and clear checkpoint documentation.</textarea></label>
          <button type="submit">Create hidden PIP</button>
          <button class="secondary" id="reloadButton" type="button">Reload</button>
        </form>
        <div id="message" class="message"></div>
      </section>

      <section>
        <div class="toolbar"><div><h2>PIP Cases</h2><p id="countLabel">Loading...</p></div></div>
        <table>
          <thead><tr><th>Employee</th><th>Plan</th><th>State</th><th>Visibility</th><th>Actions</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
    </main>

    <script src="demo-data.js?v=demo-users-1"></script>
    <script>
      const supabaseUrl = "https://omjblauittoyxknabrqg.supabase.co";
      const publishableKey = "sb_publishable_aEtaP2vsKfYpN50nuo2CSg_tU1nLEfc";
      let accessToken = localStorage.getItem("bb_access_token") || "";
      let currentUser = null;
      const message = document.querySelector("#message");
      const rows = document.querySelector("#rows");
      const countLabel = document.querySelector("#countLabel");
      const stateByStatus = {
        draft:{ status:"draft", owner:"MANAGER", nextAction:"submit", employeeVisible:false },
        submitted:{ status:"submitted", owner:"HRBP", nextAction:"approve", employeeVisible:false },
        hrbp_approved:{ status:"hrbp_approved", owner:"HRBP", nextAction:"activate_visibility", employeeVisible:false },
        visibility_active:{ status:"visibility_active", owner:"MANAGER", nextAction:"start", employeeVisible:true },
        active:{ status:"active", owner:"MANAGER", nextAction:"complete", employeeVisible:true },
        completed:{ status:"completed", owner:"SYSTEM", nextAction:null, employeeVisible:true },
        returned:{ status:"returned", owner:"MANAGER", nextAction:"update", employeeVisible:false },
        cancelled:{ status:"cancelled", owner:"SYSTEM", nextAction:null, employeeVisible:false },
      };
      function showMessage(text, type) { message.textContent = text; message.className = `message ${type}`; }
      async function supabaseFetch(path, options = {}) {
        const response = await fetch(`${supabaseUrl}${path}`, { ...options, headers:{ apikey:publishableKey, Authorization:`Bearer ${accessToken}`, "Content-Type":"application/json", ...(options.headers || {}) } });
        const text = await response.text(); const data = text ? JSON.parse(text) : null;
        if (!response.ok) throw new Error(data?.message || data?.msg || data?.hint || "Request failed");
        return data;
      }
      async function ensureToken() {
        if (!accessToken) {
          throw new Error("Please open Login first, then return to this page.");
        }
        currentUser = await supabaseFetch("/auth/v1/user");
      }
      async function writeAudit(action, item, fromStatus, toStatus, metadata = {}) {
        await supabaseFetch("/rest/v1/audit_events", { method:"POST", headers:{ Prefer:"return=minimal" }, body:JSON.stringify({ actor_user_id:currentUser.id, target_user_id:item.employee_id, action, entity_type:"pip_case", entity_id:item.id, from_status:fromStatus, to_status:toStatus, reason:metadata.reason || null, metadata:{ owner:metadata.owner, nextAction:metadata.nextAction, employeeVisible:item.employee_visible, ...metadata } }) });
      }
      async function loadProfiles() {
        const profiles = await supabaseFetch("/rest/v1/profiles?select=id,display_name,email,role_code,account_status,manager_id,hrbp_id&account_status=eq.active&order=display_name.asc&limit=200");
        const options = profiles.map((profile) => `<option value="${profile.id}">${profile.display_name} · ${profile.role_code}</option>`).join("");
        document.querySelector("#employeeId").innerHTML = options;
        document.querySelector("#managerId").innerHTML = `<option value="">Current user</option>${options}`;
        document.querySelector("#hrbpId").innerHTML = `<option value="">None</option>${options}`;
      }
      async function loadCases() {
        const cases = await supabaseFetch("/rest/v1/pip_cases?select=*&order=updated_at.desc");
        countLabel.textContent = `${cases.length} case${cases.length === 1 ? "" : "s"}`;
        rows.innerHTML = cases.map((item) => `<tr>
          <td><code>${item.employee_id}</code><div class="muted">Manager: ${item.manager_id || "-"}</div><div class="muted">HRBP: ${item.hrbp_id || "-"}</div></td>
          <td><strong>${item.performance_concern}</strong><p>${item.success_criteria}</p><div class="muted">Due: ${item.due_date || "-"} · Checkpoints: ${(item.checkpoints || []).length}</div></td>
          <td><span class="pill ${item.status}">${item.status}</span><div class="muted">${item.owner_role} / ${item.next_action || "done"}</div></td>
          <td><span class="visibility ${item.employee_visible ? "on" : ""}">${item.employee_visible ? "Visible to employee" : "Hidden from employee"}</span><div class="muted"><code>${JSON.stringify(item.visibility || {})}</code></div></td>
          <td class="actions">
            ${["draft","returned"].includes(item.status) ? `<button data-action="submit" data-id="${item.id}">Submit to HRBP</button>` : ""}
            ${item.status === "submitted" ? `<button data-action="approve" data-id="${item.id}">HRBP approve</button>` : ""}
            ${item.status === "hrbp_approved" ? `<button data-action="activate_visibility" data-id="${item.id}">Activate visibility</button>` : ""}
            ${item.status === "visibility_active" ? `<button data-action="start" data-id="${item.id}">Start PIP</button>` : ""}
            ${item.status === "active" ? `<button data-action="complete" data-id="${item.id}">Complete</button>` : ""}
            ${["submitted","hrbp_approved","visibility_active"].includes(item.status) ? `<button class="warning" data-action="return" data-id="${item.id}">Return</button>` : ""}
            ${!["completed","cancelled"].includes(item.status) ? `<button class="secondary" data-action="visibility" data-id="${item.id}">Override visibility</button><button class="secondary" data-action="cancel" data-id="${item.id}">Cancel</button>` : ""}
          </td>
        </tr>`).join("");
        document.querySelectorAll("[data-action]").forEach((button) => button.addEventListener("click", () => handleAction(button.dataset.id, button.dataset.action).catch((error) => showMessage(error.message, "error"))));
      }
      async function createCase(event) {
        event.preventDefault();
        const state = stateByStatus.draft;
        const item = {
          id:crypto.randomUUID(),
          employee_id:document.querySelector("#employeeId").value,
          manager_id:document.querySelector("#managerId").value || currentUser.id,
          hrbp_id:document.querySelector("#hrbpId").value || null,
          source_evaluation_id:document.querySelector("#sourceEvaluationId").value.trim() || null,
          status:state.status,
          owner_role:state.owner,
          next_action:state.nextAction,
          employee_visible:state.employeeVisible,
          performance_concern:document.querySelector("#performanceConcern").value.trim(),
          success_criteria:document.querySelector("#successCriteria").value.trim(),
          support_plan:document.querySelector("#supportPlan").value.trim(),
          start_date:document.querySelector("#startDate").value || null,
          due_date:document.querySelector("#dueDate").value || null,
          checkpoints:[{ label:"Checkpoint 1", dueInDays:14 }, { label:"Checkpoint 2", dueInDays:30 }],
          visibility:{ employeeCanView:false, managerCanView:true, hrbpCanView:true, hrAdminCanView:true },
          created_by:currentUser.id,
          updated_by:currentUser.id,
        };
        await supabaseFetch("/rest/v1/pip_cases", { method:"POST", headers:{ Prefer:"return=minimal" }, body:JSON.stringify(item) });
        await writeAudit("pip.created", item, null, state.status, { owner:state.owner, nextAction:state.nextAction });
        showMessage("Hidden PIP case created and audit event written.", "success");
        await loadCases();
      }
      async function handleAction(id, action) {
        const [current] = await supabaseFetch(`/rest/v1/pip_cases?id=eq.${id}&select=*`);
        const stateMap = { submit:"submitted", approve:"hrbp_approved", activate_visibility:"visibility_active", start:"active", complete:"completed", return:"returned", cancel:"cancelled", visibility:current.status };
        const state = stateByStatus[stateMap[action]];
        const patch = { status:state.status, owner_role:state.owner, next_action:state.nextAction, employee_visible:state.employeeVisible, updated_by:currentUser.id, updated_at:new Date().toISOString() };
        if (action === "submit") patch.submitted_at = new Date().toISOString();
        if (action === "approve") patch.hrbp_approved_at = new Date().toISOString();
        if (action === "activate_visibility") { patch.visibility_activated_at = new Date().toISOString(); patch.visibility = { employeeCanView:true, managerCanView:true, hrbpCanView:true, hrAdminCanView:true }; }
        if (action === "start") patch.started_at = new Date().toISOString();
        if (action === "complete") patch.completed_at = new Date().toISOString();
        if (action === "return") { patch.returned_at = new Date().toISOString(); patch.last_return_reason = "Returned from temporary scaffold"; }
        if (action === "cancel") patch.cancelled_at = new Date().toISOString();
        if (action === "visibility") {
          const nextVisible = !current.employee_visible;
          patch.employee_visible = nextVisible && current.status !== "cancelled";
          patch.visibility = { employeeCanView:patch.employee_visible, managerCanView:true, hrbpCanView:true, hrAdminCanView:true };
          patch.visibility_changed_at = new Date().toISOString();
        }
        await supabaseFetch(`/rest/v1/pip_cases?id=eq.${id}`, { method:"PATCH", headers:{ Prefer:"return=minimal" }, body:JSON.stringify(patch) });
        const auditAction = action === "activate_visibility" ? "pip.visibility_activated" : action === "visibility" ? "pip.visibility_changed" : `pip.${action === "return" ? "returned" : action === "cancel" ? "cancelled" : action === "approve" ? "approved" : action === "complete" ? "completed" : action === "start" ? "started" : "submitted"}`;
        await writeAudit(auditAction, { ...current, employee_visible:patch.employee_visible }, current.status, state.status, { owner:state.owner, nextAction:state.nextAction, reason:patch.last_return_reason || null });
        if (action === "activate_visibility") await writeAudit("pip.visibility_changed", { ...current, employee_visible:true }, current.status, state.status, { owner:state.owner, nextAction:state.nextAction });
        showMessage("PIP action saved and audit event written.", "success");
        await loadCases();
      }
      document.querySelector("#createForm").addEventListener("submit", createCase);
      document.querySelector("#reloadButton").addEventListener("click", () => loadCases().catch((error) => showMessage(error.message, "error")));
      (async function init() { try { await ensureToken(); await loadProfiles(); await loadCases(); } catch (error) { showMessage(error.message, "error"); countLabel.textContent = "Could not load PIP cases"; } })();
    </script>
    <script src="detail-shell.js?v=remove-header-nav-1"></script>
  </body>
</html>
