<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BimeBazar Profile Org Chart</title>
    <style>
      :root { --bg:#f5f8f7; --panel:#fff; --ink:#172026; --muted:#5c6b73; --line:#d8e1e5; --teal:#087c7c; --gold:#bd7f18; --green:#2f7d49; --danger:#b33b35; }
      * { box-sizing:border-box; }
      body { margin:0; background:var(--bg); color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      main { max-width:1240px; margin:0 auto; padding:28px 18px 48px; }
      header,.toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; }
      h1 { margin:0 0 6px; font-size:clamp(1.8rem,4vw,3rem); }
      h2 { margin:0 0 12px; }
      p { margin:0; color:var(--muted); line-height:1.45; }
      section { margin-top:18px; border:1px solid var(--line); border-radius:8px; padding:18px; background:var(--panel); box-shadow:0 12px 34px rgba(22,40,48,.08); }
      form { display:grid; grid-template-columns:repeat(4,minmax(160px,1fr)); gap:12px; }
      label { display:grid; gap:6px; color:var(--muted); font-size:.82rem; font-weight:750; }
      input,select { border:1px solid var(--line); border-radius:8px; min-height:40px; padding:0 10px; color:var(--ink); font:inherit; background:#fff; }
      button { min-height:40px; border:0; border-radius:8px; background:var(--teal); color:#fff; cursor:pointer; font:inherit; font-weight:800; padding:0 12px; }
      button.secondary { border:1px solid var(--line); background:#fff; color:var(--ink); }
      button.warning { background:var(--gold); }
      table { width:100%; border-collapse:collapse; margin-top:14px; }
      th,td { border-bottom:1px solid var(--line); padding:10px 8px; text-align:left; vertical-align:top; }
      th { color:var(--muted); font-size:.78rem; }
      code { font-size:.76rem; word-break:break-word; }
      .full { grid-column:1 / -1; }
      .pill { display:inline-flex; border-radius:999px; padding:4px 8px; background:#e8f4f2; color:#075b5b; font-size:.76rem; font-weight:800; }
      .pill.active { background:#e9f7ed; color:var(--green); }
      .pill.returned,.pill.visibility_changed { background:#fff1d6; color:#7a4f00; }
      .pill.archived { background:#eef0f1; color:#51616a; }
      .muted { margin-top:4px; color:var(--muted); font-size:.75rem; }
      .actions { display:flex; flex-wrap:wrap; gap:8px; }
      .message { display:none; margin-top:12px; border-radius:8px; padding:10px 12px; }
      .message.error { display:block; border:1px solid #efb3ad; background:#fff0ee; color:var(--danger); }
      .message.success { display:block; border:1px solid #b8dfc2; background:#eefaf1; color:#245f37; }
      .chart { overflow:auto; padding:20px; background:linear-gradient(#f9fbfa,#f4f8f7); border:1px solid var(--line); border-radius:8px; }
      .level { display:flex; justify-content:center; gap:16px; min-width:760px; position:relative; }
      .level + .level { margin-top:34px; padding-top:22px; border-top:1px dashed #c7d5d2; }
      .card { width:220px; border:1px solid var(--line); border-radius:8px; padding:12px; background:#fff; box-shadow:0 8px 24px rgba(22,40,48,.07); }
      .card.root { border-color:var(--teal); box-shadow:0 0 0 3px rgba(8,124,124,.12); }
      .avatar { width:36px; height:36px; border-radius:999px; display:grid; place-items:center; margin-bottom:10px; background:#e7f3f1; color:#075b5b; font-weight:900; }
      .card strong { display:block; line-height:1.2; }
      .lineLabel { text-align:center; color:var(--muted); font-size:.75rem; font-weight:800; min-width:760px; margin:18px 0 -12px; }
      @media (max-width:980px) { header,.toolbar { align-items:stretch; flex-direction:column; } form { grid-template-columns:1fr; } table { display:block; overflow-x:auto; } }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Visual Org Chart On Profile</h1>
          <p>Show each employee’s manager and direct reports as a reviewed, auditable profile snapshot.</p>
        </div>
        <nav><a href="/all-pages.html">All pages</a></nav>
      </header>

      <section>
        <h2>Create Org Chart</h2>
        <form id="chartForm">
          <label class="full">Root employee<select id="rootProfileId" required></select></label>
          <label>Name<input id="name" value="Profile reporting view" required /></label>
          <label>Max depth<input id="maxDepth" type="number" min="1" max="6" value="3" /></label>
          <label>Layout<select id="layout"><option value="tree">Tree</option><option value="compact">Compact</option><option value="radial">Radial</option></select></label>
          <label>Description<input id="description" value="Visual reporting-line snapshot for the profile page." /></label>
          <button type="submit">Create chart</button>
          <button class="secondary" id="reloadButton" type="button">Reload</button>
        </form>
        <div id="message" class="message"></div>
      </section>

      <section>
        <div class="toolbar">
          <div><h2>Preview</h2><p id="previewLabel">Choose or create a chart.</p></div>
          <select id="previewChart"></select>
        </div>
        <div class="chart" id="chartCanvas"></div>
      </section>

      <section>
        <div class="toolbar"><div><h2>Org Charts</h2><p id="countLabel">Loading...</p></div></div>
        <table>
          <thead><tr><th>Name</th><th>State</th><th>Snapshot</th><th>Visibility</th><th>Actions</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
    </main>

    <script>
      const supabaseUrl = "https://omjblauittoyxknabrqg.supabase.co";
      const publishableKey = "sb_publishable_aEtaP2vsKfYpN50nuo2CSg_tU1nLEfc";
      let accessToken = localStorage.getItem("bb_access_token") || "";
      let currentUser = null;
      let profiles = [];
      let charts = [];
      const message = document.querySelector("#message");
      const rows = document.querySelector("#rows");
      const countLabel = document.querySelector("#countLabel");
      const stateByStatus = {
        draft:{ status:"draft", owner:"HR_ADMIN", nextAction:"submit" },
        submitted:{ status:"submitted", owner:"HRBP", nextAction:"approve" },
        approved:{ status:"approved", owner:"HR_ADMIN", nextAction:"activate" },
        active:{ status:"active", owner:"SYSTEM", nextAction:null },
        returned:{ status:"returned", owner:"HR_ADMIN", nextAction:"update" },
        visibility_changed:{ status:"visibility_changed", owner:"HR_ADMIN", nextAction:"update" },
        archived:{ status:"archived", owner:"SYSTEM", nextAction:null },
      };
      const actionStatus = { update:"draft", refresh:null, submit:"submitted", approve:"approved", activate:"active", return:"returned", visibility:"visibility_changed", archive:"archived" };
      const auditActionByAction = { update:"updated", refresh:"refreshed", submit:"submitted", approve:"approved", activate:"activated", return:"returned", visibility:"visibility_changed", archive:"archived" };
      function showMessage(text, type) { message.textContent = text; message.className = `message ${type}`; }
      async function supabaseFetch(path, options = {}) {
        const response = await fetch(`${supabaseUrl}${path}`, { ...options, headers:{ apikey:publishableKey, Authorization:`Bearer ${accessToken}`, "Content-Type":"application/json", ...(options.headers || {}) } });
        const text = await response.text(); const data = text ? JSON.parse(text) : null;
        if (!response.ok) throw new Error(data?.message || data?.msg || data?.hint || "Request failed");
        return data;
      }
      async function ensureToken() {
        if (!accessToken) {
          const email = prompt("Enter your BimeBazar admin email", "h.mirsaeedi@bimebazar.com");
          const password = prompt("Enter your password");
          const data = await fetch(`${supabaseUrl}/auth/v1/token?grant_type=password`, { method:"POST", headers:{ apikey:publishableKey, "Content-Type":"application/json" }, body:JSON.stringify({ email, password }) }).then(async (response) => {
            const body = await response.json(); if (!response.ok) throw new Error(body.msg || "Login failed"); return body;
          });
          accessToken = data.access_token; localStorage.setItem("bb_access_token", accessToken);
        }
        currentUser = await supabaseFetch("/auth/v1/user");
      }
      function buildSnapshot(rootProfileId, maxDepth) {
        const byId = new Map(profiles.map((profile) => [profile.id, profile]));
        const childrenByManager = new Map();
        profiles.forEach((profile) => {
          if (!profile.manager_id) return;
          const list = childrenByManager.get(profile.manager_id) || [];
          list.push(profile);
          childrenByManager.set(profile.manager_id, list);
        });
        const root = byId.get(rootProfileId);
        const nodes = [], edges = [], seen = new Set();
        const toNode = (profile, depth) => ({ id:profile.id, employeeId:profile.employee_id, name:profile.full_name_english || profile.display_name || profile.email, persianName:profile.full_name_persian, title:profile.position_title || "Not assigned", level:profile.level, managerId:profile.manager_id, status:profile.account_status, depth });
        if (root?.manager_id && byId.has(root.manager_id)) { const manager = byId.get(root.manager_id); nodes.push(toNode(manager, -1)); edges.push({ from:manager.id, to:root.id, relationship:"manager" }); }
        const visit = (profile, depth) => {
          if (!profile || seen.has(profile.id) || depth > maxDepth) return;
          seen.add(profile.id); nodes.push(toNode(profile, depth));
          for (const child of childrenByManager.get(profile.id) || []) { edges.push({ from:profile.id, to:child.id, relationship:"manager" }); visit(child, depth + 1); }
        };
        visit(root, 0);
        return { rootProfileId, generatedAt:new Date().toISOString(), maxDepth, nodes, edges, directReportCount:(childrenByManager.get(rootProfileId) || []).length };
      }
      async function writeAudit(action, item, fromStatus, toStatus, metadata = {}) {
        await supabaseFetch("/rest/v1/audit_events", { method:"POST", headers:{ Prefer:"return=minimal" }, body:JSON.stringify({ actor_user_id:currentUser.id, target_user_id:item.root_profile_id, action, entity_type:"profile_org_chart", entity_id:item.id, from_status:fromStatus, to_status:toStatus, reason:metadata.reason || null, metadata:{ rootProfileId:item.root_profile_id, owner:metadata.owner, nextAction:metadata.nextAction, nodeCount:item.snapshot?.nodes?.length || 0, ...metadata } }) });
      }
      async function loadProfiles() {
        profiles = await supabaseFetch("/rest/v1/profiles?select=id,email,display_name,employee_id,full_name_persian,full_name_english,manager_id,level,position_title,account_status&account_status=in.(active,invited,locked)&order=employee_id.asc");
        document.querySelector("#rootProfileId").innerHTML = profiles.map((profile) => `<option value="${profile.id}">${profile.employee_id || "No ID"} · ${profile.full_name_english || profile.display_name || profile.email}</option>`).join("");
      }
      async function loadCharts() {
        charts = await supabaseFetch("/rest/v1/profile_org_charts?select=*&order=updated_at.desc");
        countLabel.textContent = `${charts.length} chart${charts.length === 1 ? "" : "s"}`;
        document.querySelector("#previewChart").innerHTML = charts.map((chart) => `<option value="${chart.id}">${chart.name} · ${chart.status}</option>`).join("");
        rows.innerHTML = charts.map((chart) => `<tr>
          <td><strong>${chart.name}</strong><div class="muted"><code>${chart.id}</code></div><div class="muted">${chart.description || ""}</div></td>
          <td><span class="pill ${chart.status}">${chart.status}</span><div class="muted">${chart.owner_role} / ${chart.next_action || "done"}</div></td>
          <td>${chart.snapshot?.nodes?.length || 0} people<div class="muted">${chart.snapshot?.edges?.length || 0} reporting lines · depth ${chart.max_depth}</div></td>
          <td><code>${JSON.stringify(chart.visibility)}</code></td>
          <td class="actions">
            ${["draft","returned","visibility_changed"].includes(chart.status) ? `<button data-action="submit" data-id="${chart.id}">Submit</button><button class="secondary" data-action="update" data-id="${chart.id}">Update</button>` : ""}
            ${chart.status === "submitted" ? `<button data-action="approve" data-id="${chart.id}">Approve</button><button class="warning" data-action="return" data-id="${chart.id}">Return</button>` : ""}
            ${chart.status === "approved" ? `<button data-action="activate" data-id="${chart.id}">Activate</button>` : ""}
            ${chart.status !== "archived" ? `<button class="secondary" data-action="refresh" data-id="${chart.id}">Refresh</button><button class="secondary" data-action="visibility" data-id="${chart.id}">Visibility</button><button class="secondary" data-action="archive" data-id="${chart.id}">Archive</button>` : ""}
          </td>
        </tr>`).join("");
        document.querySelectorAll("[data-action]").forEach((button) => button.addEventListener("click", () => handleAction(button.dataset.id, button.dataset.action).catch((error) => showMessage(error.message, "error"))));
        renderChart();
      }
      async function createChart(event) {
        event.preventDefault();
        const rootProfileId = document.querySelector("#rootProfileId").value;
        const maxDepth = Number(document.querySelector("#maxDepth").value);
        const state = stateByStatus.draft;
        const item = { id:crypto.randomUUID(), root_profile_id:rootProfileId, status:state.status, owner_role:state.owner, next_action:state.nextAction, name:document.querySelector("#name").value.trim(), description:document.querySelector("#description").value.trim(), snapshot:buildSnapshot(rootProfileId, maxDepth), layout:document.querySelector("#layout").value, visibility:{ employeeCanView:true, managerCanView:true, hrbpCanView:true, hrAdminCanView:true }, max_depth:maxDepth, created_by:currentUser.id, updated_by:currentUser.id };
        await supabaseFetch("/rest/v1/profile_org_charts", { method:"POST", headers:{ Prefer:"return=minimal" }, body:JSON.stringify(item) });
        await writeAudit("profile_org_chart.created", item, null, state.status, { owner:state.owner, nextAction:state.nextAction });
        showMessage("Org chart created and audit event written.", "success");
        await loadCharts();
      }
      async function handleAction(id, action) {
        const item = charts.find((chart) => chart.id === id);
        const next = action === "refresh" ? stateByStatus[item.status] : stateByStatus[actionStatus[action]];
        const patch = { status:next.status, owner_role:next.owner, next_action:next.nextAction, updated_by:currentUser.id, updated_at:new Date().toISOString() };
        if (action === "update" || action === "refresh") { patch.snapshot = buildSnapshot(item.root_profile_id, item.max_depth || 3); patch.refreshed_at = new Date().toISOString(); }
        if (action === "submit") patch.submitted_at = new Date().toISOString();
        if (action === "approve") patch.approved_at = new Date().toISOString();
        if (action === "activate") patch.activated_at = new Date().toISOString();
        if (action === "return") { patch.returned_at = new Date().toISOString(); patch.last_return_reason = prompt("Reason for return", "Needs visual review.") || "Returned for revision"; }
        if (action === "visibility") { patch.visibility_changed_at = new Date().toISOString(); patch.visibility = { ...(item.visibility || {}), employeeCanView:false }; }
        if (action === "archive") patch.archived_at = new Date().toISOString();
        await supabaseFetch(`/rest/v1/profile_org_charts?id=eq.${id}`, { method:"PATCH", headers:{ Prefer:"return=minimal" }, body:JSON.stringify(patch) });
        await writeAudit(`profile_org_chart.${auditActionByAction[action]}`, { ...item, ...patch }, item.status, next.status, { owner:next.owner, nextAction:next.nextAction, reason:patch.last_return_reason });
        showMessage(`Org chart moved to ${next.status}.`, "success");
        await loadCharts();
      }
      function renderChart() {
        const chart = charts.find((item) => item.id === document.querySelector("#previewChart").value) || charts[0];
        if (!chart) { document.querySelector("#chartCanvas").innerHTML = "<p>No org chart yet.</p>"; return; }
        document.querySelector("#previewLabel").textContent = `${chart.snapshot?.nodes?.length || 0} people · ${chart.snapshot?.edges?.length || 0} reporting lines`;
        const levels = new Map();
        for (const node of chart.snapshot?.nodes || []) {
          const depth = node.depth ?? 0;
          const list = levels.get(depth) || [];
          list.push(node);
          levels.set(depth, list);
        }
        const html = [...levels.entries()].sort(([a],[b]) => a - b).map(([depth, nodes]) => {
          const label = depth < 0 ? "Manager" : depth === 0 ? "Profile employee" : `Direct reports · level ${depth}`;
          return `<div class="lineLabel">${label}</div><div class="level">${nodes.map((node) => `<article class="card ${depth === 0 ? "root" : ""}"><div class="avatar">${String(node.name || "?").slice(0,1)}</div><strong>${node.name}</strong><div class="muted">${node.title}</div><div class="muted">${node.employeeId || ""} · ${node.level || ""}</div><span class="pill ${node.status}">${node.status}</span></article>`).join("")}</div>`;
        }).join("");
        document.querySelector("#chartCanvas").innerHTML = html;
      }
      async function init() {
        try {
          await ensureToken();
          await loadProfiles();
          await loadCharts();
          document.querySelector("#chartForm").addEventListener("submit", createChart);
          document.querySelector("#previewChart").addEventListener("change", renderChart);
          document.querySelector("#reloadButton").addEventListener("click", () => init().catch((error) => showMessage(error.message, "error")));
        } catch (error) {
          showMessage(error.message, "error");
        }
      }
      init();
    </script>
  </body>
</html>
