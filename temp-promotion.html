<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BimeBazar Promotion Workflow</title>
    <style>
      :root { --bg:#f5f8f7; --panel:#fff; --ink:#172026; --muted:#5c6b73; --line:#d8e1e5; --teal:#087c7c; --gold:#bd7f18; --danger:#b33b35; }
      * { box-sizing:border-box; }
      body { margin:0; background:var(--bg); color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      main { max-width:1240px; margin:0 auto; padding:28px 18px 48px; }
      header,.toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; }
      h1 { margin:0 0 6px; font-size:clamp(1.8rem,4vw,3rem); }
      h2 { margin:0 0 12px; }
      p { margin:0; color:var(--muted); line-height:1.45; }
      section { margin-top:18px; border:1px solid var(--line); border-radius:8px; padding:18px; background:var(--panel); box-shadow:0 12px 34px rgba(22,40,48,.08); }
      form { display:grid; grid-template-columns:repeat(4,minmax(150px,1fr)); gap:12px; }
      label { display:grid; gap:6px; color:var(--muted); font-size:.82rem; font-weight:750; }
      input,select,textarea { border:1px solid var(--line); border-radius:8px; padding:10px; color:var(--ink); font:inherit; background:#fff; }
      textarea { min-height:92px; resize:vertical; }
      button { min-height:40px; border:0; border-radius:8px; background:var(--teal); color:#fff; cursor:pointer; font:inherit; font-weight:800; padding:0 12px; }
      button.secondary { border:1px solid var(--line); background:#fff; color:var(--ink); }
      button.warning { background:var(--gold); }
      table { width:100%; border-collapse:collapse; margin-top:14px; }
      th,td { border-bottom:1px solid var(--line); padding:10px 8px; text-align:left; vertical-align:top; }
      th { color:var(--muted); font-size:.78rem; }
      code { font-size:.76rem; word-break:break-all; }
      .full { grid-column:1 / -1; }
      .pill { display:inline-flex; border-radius:999px; padding:4px 8px; background:#e8f4f2; color:#075b5b; font-size:.76rem; font-weight:800; }
      .pill.returned { background:#fff1d6; color:#7a4f00; }
      .pill.cancelled { background:#eef0f1; color:#51616a; }
      .muted { margin-top:4px; color:var(--muted); font-size:.75rem; }
      .actions { display:flex; flex-wrap:wrap; gap:8px; }
      .message { display:none; margin-top:12px; border-radius:8px; padding:10px 12px; }
      .message.error { display:block; border:1px solid #efb3ad; background:#fff0ee; color:var(--danger); }
      .message.success { display:block; border:1px solid #b8dfc2; background:#eefaf1; color:#245f37; }
      @media (max-width:980px) { header,.toolbar { align-items:stretch; flex-direction:column; } form { grid-template-columns:1fr; } table { display:block; overflow-x:auto; } }
    </style>
    <link rel="stylesheet" href="detail-ui.css?v=sidebar-brand-standard-1" />
    <link rel="stylesheet" href="product-ui.css?v=sidebar-brand-black-1" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Promotion Workflow</h1>
          <p>Create promotion cases, submit them through Manager, HRBP, and HR Admin approval, and audit each decision.</p>
        </div>
        <nav><a href="./index.html">Workspace</a></nav>
      </header>

      <section>
        <h2>Create Promotion Case</h2>
        <form id="createForm">
          <label>Employee<select id="employeeId" required></select></label>
          <label>Manager<select id="managerId"></select></label>
          <label>HRBP<select id="hrbpId"></select></label>
          <label>Effective Date<input id="effectiveDate" type="date" /></label>
          <label>Current Level<input id="currentLevel" value="L2" /></label>
          <label>Proposed Level<input id="proposedLevel" value="L3" required /></label>
          <label>Current Title<input id="currentTitle" value="Specialist" /></label>
          <label>Proposed Title<input id="proposedTitle" value="Senior Specialist" /></label>
          <label class="full">Rationale<textarea id="rationale" required>Strong performance evidence, expanded scope, and readiness for the next role.</textarea></label>
          <button type="submit">Create case</button>
          <button class="secondary" id="reloadButton" type="button">Reload</button>
        </form>
        <div id="message" class="message"></div>
      </section>

      <section>
        <div class="toolbar"><div><h2>Promotion Cases</h2><p id="countLabel">Loading...</p></div></div>
        <table>
          <thead><tr><th>Employee</th><th>Promotion</th><th>State</th><th>Evidence</th><th>Actions</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
    </main>

    <script src="demo-data.js?v=demo-users-1"></script>
    <script>
      const supabaseUrl = "https://omjblauittoyxknabrqg.supabase.co";
      const publishableKey = "sb_publishable_aEtaP2vsKfYpN50nuo2CSg_tU1nLEfc";
      let accessToken = localStorage.getItem("bb_access_token") || "";
      let currentUser = null;
      const message = document.querySelector("#message");
      const rows = document.querySelector("#rows");
      const countLabel = document.querySelector("#countLabel");
      const stateByStatus = {
        draft:{ status:"draft", owner:"MANAGER", nextAction:"submit" },
        submitted:{ status:"submitted", owner:"MANAGER", nextAction:"manager_approve" },
        manager_approved:{ status:"manager_approved", owner:"HRBP", nextAction:"hrbp_approve" },
        hrbp_approved:{ status:"hrbp_approved", owner:"HR_ADMIN", nextAction:"approve" },
        approved:{ status:"approved", owner:"SYSTEM", nextAction:null },
        returned:{ status:"returned", owner:"MANAGER", nextAction:"update" },
        cancelled:{ status:"cancelled", owner:"SYSTEM", nextAction:null },
      };
      function showMessage(text, type) { message.textContent = text; message.className = `message ${type}`; }
      async function supabaseFetch(path, options = {}) {
        const response = await fetch(`${supabaseUrl}${path}`, { ...options, headers:{ apikey:publishableKey, Authorization:`Bearer ${accessToken}`, "Content-Type":"application/json", ...(options.headers || {}) } });
        const text = await response.text(); const data = text ? JSON.parse(text) : null;
        if (!response.ok) throw new Error(data?.message || data?.msg || data?.hint || "Request failed");
        return data;
      }
      async function ensureToken() {
        if (!accessToken) {
          throw new Error("Please open Login first, then return to this page.");
        }
        currentUser = await supabaseFetch("/auth/v1/user");
      }
      async function writeAudit(action, item, fromStatus, toStatus, metadata = {}) {
        await supabaseFetch("/rest/v1/audit_events", { method:"POST", headers:{ Prefer:"return=minimal" }, body:JSON.stringify({ actor_user_id:currentUser.id, target_user_id:item.employee_id, action, entity_type:"promotion_case", entity_id:item.id, from_status:fromStatus, to_status:toStatus, reason:metadata.reason || null, metadata:{ owner:metadata.owner, nextAction:metadata.nextAction, proposedLevel:item.proposed_level, ...metadata } }) });
      }
      async function loadProfiles() {
        const profiles = await supabaseFetch("/rest/v1/profiles?select=id,display_name,email,role_code,account_status,level,position_title,manager_id,hrbp_id&account_status=eq.active&order=display_name.asc&limit=200");
        const options = profiles.map((profile) => `<option value="${profile.id}">${profile.display_name} · ${profile.role_code}</option>`).join("");
        document.querySelector("#employeeId").innerHTML = options;
        document.querySelector("#managerId").innerHTML = `<option value="">Current user</option>${options}`;
        document.querySelector("#hrbpId").innerHTML = `<option value="">None</option>${options}`;
      }
      async function loadCases() {
        const cases = await supabaseFetch("/rest/v1/promotion_cases?select=*&order=updated_at.desc");
        countLabel.textContent = `${cases.length} case${cases.length === 1 ? "" : "s"}`;
        rows.innerHTML = cases.map((item) => `<tr>
          <td><code>${item.employee_id}</code><div class="muted">Manager: ${item.manager_id || "-"}</div><div class="muted">HRBP: ${item.hrbp_id || "-"}</div></td>
          <td><strong>${item.current_level || "-"} → ${item.proposed_level}</strong><p>${item.current_title || "-"} → ${item.proposed_title || "-"}</p><div class="muted">Effective: ${item.effective_date || "-"}</div></td>
          <td><span class="pill ${item.status}">${item.status}</span><div class="muted">${item.owner_role} / ${item.next_action || "done"}</div></td>
          <td>${item.rationale}<div class="muted"><code>${JSON.stringify(item.evidence || {})}</code></div></td>
          <td class="actions">
            ${["draft","returned"].includes(item.status) ? `<button data-action="submit" data-id="${item.id}">Submit</button>` : ""}
            ${item.status === "submitted" ? `<button data-action="manager_approve" data-id="${item.id}">Manager approve</button>` : ""}
            ${item.status === "manager_approved" ? `<button data-action="hrbp_approve" data-id="${item.id}">HRBP approve</button>` : ""}
            ${item.status === "hrbp_approved" ? `<button data-action="approve" data-id="${item.id}">Final approve</button>` : ""}
            ${["submitted","manager_approved","hrbp_approved"].includes(item.status) ? `<button class="warning" data-action="return" data-id="${item.id}">Return</button>` : ""}
            ${!["approved","cancelled"].includes(item.status) ? `<button class="secondary" data-action="visibility" data-id="${item.id}">Visibility</button><button class="secondary" data-action="cancel" data-id="${item.id}">Cancel</button>` : ""}
          </td>
        </tr>`).join("");
        document.querySelectorAll("[data-action]").forEach((button) => button.addEventListener("click", () => handleAction(button.dataset.id, button.dataset.action).catch((error) => showMessage(error.message, "error"))));
      }
      async function createCase(event) {
        event.preventDefault();
        const state = stateByStatus.draft;
        const item = {
          id:crypto.randomUUID(),
          employee_id:document.querySelector("#employeeId").value,
          manager_id:document.querySelector("#managerId").value || currentUser.id,
          hrbp_id:document.querySelector("#hrbpId").value || null,
          status:state.status,
          owner_role:state.owner,
          next_action:state.nextAction,
          current_level:document.querySelector("#currentLevel").value.trim() || null,
          proposed_level:document.querySelector("#proposedLevel").value.trim(),
          current_title:document.querySelector("#currentTitle").value.trim() || null,
          proposed_title:document.querySelector("#proposedTitle").value.trim() || null,
          effective_date:document.querySelector("#effectiveDate").value || null,
          rationale:document.querySelector("#rationale").value.trim(),
          evidence:{ source:"temp-promotion" },
          visibility:{ employeeCanView:false, managerCanView:true, hrbpCanView:true, hrAdminCanView:true },
          created_by:currentUser.id,
          updated_by:currentUser.id,
        };
        await supabaseFetch("/rest/v1/promotion_cases", { method:"POST", headers:{ Prefer:"return=minimal" }, body:JSON.stringify(item) });
        await writeAudit("promotion.created", item, null, state.status, { owner:state.owner, nextAction:state.nextAction });
        showMessage("Promotion case created and audit event written.", "success");
        await loadCases();
      }
      async function handleAction(id, action) {
        const [current] = await supabaseFetch(`/rest/v1/promotion_cases?id=eq.${id}&select=*`);
        const stateMap = { submit:"submitted", manager_approve:"manager_approved", hrbp_approve:"hrbp_approved", approve:"approved", return:"returned", cancel:"cancelled", visibility:current.status };
        const state = stateByStatus[stateMap[action]];
        const patch = { status:state.status, owner_role:state.owner, next_action:state.nextAction, updated_by:currentUser.id, updated_at:new Date().toISOString() };
        if (action === "submit") patch.submitted_at = new Date().toISOString();
        if (action === "manager_approve") patch.manager_approved_at = new Date().toISOString();
        if (action === "hrbp_approve") patch.hrbp_approved_at = new Date().toISOString();
        if (action === "approve") patch.approved_at = new Date().toISOString();
        if (action === "return") { patch.returned_at = new Date().toISOString(); patch.last_return_reason = "Returned from temporary scaffold"; }
        if (action === "cancel") patch.cancelled_at = new Date().toISOString();
        if (action === "visibility") { patch.visibility = { employeeCanView:true, managerCanView:true, hrbpCanView:true, hrAdminCanView:true }; patch.visibility_changed_at = new Date().toISOString(); }
        await supabaseFetch(`/rest/v1/promotion_cases?id=eq.${id}`, { method:"PATCH", headers:{ Prefer:"return=minimal" }, body:JSON.stringify(patch) });
        const auditAction = action === "manager_approve" ? "promotion.manager_approved" : action === "hrbp_approve" ? "promotion.hrbp_approved" : action === "visibility" ? "promotion.visibility_changed" : `promotion.${action === "return" ? "returned" : action === "cancel" ? "cancelled" : action === "approve" ? "approved" : "submitted"}`;
        await writeAudit(auditAction, current, current.status, state.status, { owner:state.owner, nextAction:state.nextAction, reason:patch.last_return_reason || null });
        showMessage("Promotion action saved and audit event written.", "success");
        await loadCases();
      }
      document.querySelector("#createForm").addEventListener("submit", createCase);
      document.querySelector("#reloadButton").addEventListener("click", () => loadCases().catch((error) => showMessage(error.message, "error")));
      (async function init() { try { await ensureToken(); await loadProfiles(); await loadCases(); } catch (error) { showMessage(error.message, "error"); countLabel.textContent = "Could not load promotion cases"; } })();
    </script>
    <script src="detail-shell.js?v=remove-header-nav-1"></script>
  </body>
</html>
